<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<link rel="manifest" href="/manifest.json"/>
<link rel="apple-touch-icon" href="/icons/icon-180.png"/>
<link rel="icon" type="image/png" sizes="32x32" href="/icons/icon-32.png"/>
<meta name="theme-color" content="#0a0a0a"/>
<title>ELEVA — SNSトレンド</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--gold:#c9a84c;--gold-light:#f0d070;--black:#0a0a0a;--black-card:#111111;--black-border:#1a1a1a;--border-gold:rgba(201,168,76,0.2);--text-primary:#fff;--text-secondary:#aaa;--text-muted:#666;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Inter',sans-serif;background:var(--black);color:var(--text-primary);min-height:100vh;padding-top:56px;}
::-webkit-scrollbar{width:6px;}::-webkit-scrollbar-thumb{background:rgba(201,168,76,0.3);}
.top-bar{position:fixed;top:0;left:0;right:0;height:56px;background:rgba(10,10,10,0.95);border-bottom:1px solid var(--border-gold);display:flex;align-items:center;justify-content:space-between;padding:0 20px;gap:12px;z-index:100;backdrop-filter:blur(8px);}
.top-bar-center{font-size:16px;font-weight:800;color:var(--gold-light);letter-spacing:.05em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.btn-top{background:none;border:1px solid var(--border-gold);color:var(--gold);padding:6px 12px;border-radius:16px;cursor:pointer;font-size:12px;}
/* Desktop nav (>= md 768px) */
.nav-desktop{display:none;align-items:center;gap:8px;}
.nav-desktop a{color:var(--text-secondary);font-size:12px;padding:6px 10px;border-radius:8px;text-decoration:none;letter-spacing:.05em;transition:color .15s,background .15s;}
.nav-desktop a:hover{color:var(--gold);background:rgba(201,168,76,0.08);}
.nav-desktop .btn-top{padding:6px 12px;}
@media (min-width:768px){
  .nav-desktop{display:flex;}
  .hamburger{display:none;}
}
/* Mobile hamburger (< md 768px) */
.hamburger{background:none;border:1px solid var(--border-gold);color:var(--gold);width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;cursor:pointer;padding:0;}
.hamburger svg{width:18px;height:18px;}
.mobile-sheet{position:fixed;top:56px;left:0;right:0;background:var(--black-card);border-bottom:1px solid var(--border-gold);z-index:99;transform:translateY(-120%);transition:transform .25s ease;}
.mobile-sheet.open{transform:translateY(0);}
.mobile-sheet a,.mobile-sheet button{display:flex;align-items:center;gap:10px;width:100%;padding:14px 22px;color:var(--text-primary);font-size:14px;text-decoration:none;border:none;background:transparent;border-bottom:1px solid rgba(255,255,255,0.04);text-align:left;cursor:pointer;font-family:inherit;}
.mobile-sheet a:last-child,.mobile-sheet button:last-child{border-bottom:none;}
.mobile-sheet a:hover,.mobile-sheet button:hover{color:var(--gold);background:rgba(201,168,76,0.04);}
.mobile-sheet-scrim{position:fixed;inset:56px 0 0 0;background:rgba(0,0,0,.4);z-index:98;opacity:0;pointer-events:none;transition:opacity .2s;}
.mobile-sheet-scrim.open{opacity:1;pointer-events:auto;}
.page-wrap{max-width:800px;margin:0 auto;padding:24px 16px 80px;}
.page-title{color:var(--gold-light);font-size:24px;font-weight:800;margin-bottom:8px;}
.page-subtitle{color:var(--text-secondary);font-size:14px;margin-bottom:24px;}

/* Tabs */
.tabs{display:flex;gap:0;border-bottom:1px solid var(--border-gold);margin-bottom:20px;overflow-x:auto;-webkit-overflow-scrolling:touch;}
.tab{padding:12px 20px;cursor:pointer;color:var(--text-muted);font-size:14px;white-space:nowrap;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all 0.2s;display:flex;align-items:center;gap:6px;}
.tab.active{color:var(--gold);border-bottom-color:var(--gold);}
.tab:hover:not(.active){color:#fff;}

/* Trend Cards */
.trend-section{margin-bottom:32px;}
.trend-section-title{color:var(--gold);font-size:13px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;margin-bottom:14px;display:flex;align-items:center;gap:8px;}
.trend-grid{display:grid;gap:12px;}
.trend-card{background:var(--black-card);border:1px solid var(--border-gold);border-radius:12px;padding:16px;display:flex;align-items:center;gap:14px;transition:all 0.2s;cursor:pointer;}
.trend-card:hover{border-color:var(--gold);transform:translateX(4px);}
.trend-rank{color:var(--text-muted);font-size:13px;width:24px;text-align:center;font-weight:600;}
.trend-icon{font-size:20px;color:var(--gold);}
.trend-body{flex:1;}
.trend-name{color:#fff;font-size:15px;font-weight:600;margin-bottom:4px;}
.trend-meta{color:var(--text-secondary);font-size:12px;}
.trend-count{color:var(--text-muted);font-size:12px;white-space:nowrap;}
.hash-symbol{color:var(--gold);font-weight:700;}
.music-note{font-size:20px;color:var(--gold);}
.trend-badge{display:inline-block;background:var(--gold);color:#000;font-size:10px;padding:2px 7px;border-radius:10px;font-weight:700;margin-left:6px;}
.skeleton{background:linear-gradient(90deg,#1a1a1a 25%,#222 50%,#1a1a1a 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:4px;height:14px;}
@keyframes shimmer{0%{background-position:200% 0;}100%{background-position:-200% 0;}}
.loading-card{background:var(--black-card);border:1px solid var(--border-gold);border-radius:12px;padding:16px;display:flex;gap:14px;}
</style>

</head>
<body>
<div class="top-bar">
  <div class="top-bar-center" data-i18n="sns_trend">SNSトレンド</div>
  <div class="nav-desktop">
    <a href="/dashboard.html">ダッシュボード</a>
    <a href="/trends.html">世界トレンド</a>
    <a href="/history.html">履歴</a>
    <button class="btn-top" onclick="ELEVA.showLanguageModal()" aria-label="言語">🌐</button>
  </div>
  <button class="hamburger" id="hamburger-btn" onclick="toggleMobileNav()" aria-label="メニュー">
    <svg viewBox="0 0 24 24" fill="none"><path d="M4 7h16M4 12h16M4 17h16" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
  </button>
</div>
<div class="mobile-sheet-scrim" id="m-scrim" onclick="toggleMobileNav()"></div>
<div class="mobile-sheet" id="m-sheet">
  <a href="/dashboard.html">ダッシュボード</a>
  <a href="/trends.html">世界トレンド</a>
  <a href="/history.html">履歴</a>
  <a href="/mypage.html">マイページ</a>
  <a href="/settings.html">設定</a>
  <button onclick="ELEVA.showLanguageModal();toggleMobileNav();">🌐 言語を変更</button>
</div>

<div class="page-wrap">
  <h1 class="page-title" data-i18n="sns_trend">SNSトレンド</h1>
  <p class="page-subtitle">各プラットフォームのリアルタイムトレンドをチェック</p>
  <div id="user-genre-hint" style="display:none;align-items:center;gap:8px;background:rgba(201,168,76,0.08);border:1px solid rgba(201,168,76,0.25);color:#c9a84c;padding:8px 14px;border-radius:999px;font-size:12.5px;margin-bottom:16px;width:fit-content;">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
    あなたのジャンル：<span data-genre-val style="color:#fff;font-weight:600;">—</span><span style="color:var(--text-muted);">のトピックを優先表示</span>
  </div>

  <!-- Platform Tabs -->
  <div class="tabs" id="platform-tabs">
    <div class="tab active" data-platform="tiktok" onclick="selectPlatform(this)">🎵 TikTok</div>
    <div class="tab" data-platform="instagram" onclick="selectPlatform(this)">📸 Instagram</div>
    <div class="tab" data-platform="youtube" onclick="selectPlatform(this)">▶️ YouTube</div>
    <div class="tab" data-platform="x" onclick="selectPlatform(this)">𝕏 X</div>
  </div>

  <!-- Period Sub-tabs -->
  <div class="tabs" id="period-tabs" style="margin-bottom:28px;">
    <div class="tab active" data-period="daily" onclick="selectPeriod(this)" data-i18n="daily">日次</div>
    <div class="tab" data-period="weekly" onclick="selectPeriod(this)" data-i18n="weekly">週次</div>
    <div class="tab" data-period="monthly" onclick="selectPeriod(this)" data-i18n="monthly">月次</div>
  </div>

  <!-- Content -->
  <div id="trend-content">
    <!-- Hashtags -->
    <div class="trend-section">
      <div class="trend-section-title">🏷️ <span data-i18n="hashtags">ハッシュタグ</span></div>
      <div class="trend-grid" id="hashtag-grid">
        <div class="loading-card"><div class="trend-rank">1</div><div style="flex:1;"><div class="skeleton" style="width:60%;margin-bottom:8px;"></div><div class="skeleton" style="width:40%;height:10px;"></div></div></div>
        <div class="loading-card"><div class="trend-rank">2</div><div style="flex:1;"><div class="skeleton" style="width:50%;margin-bottom:8px;"></div><div class="skeleton" style="width:35%;height:10px;"></div></div></div>
        <div class="loading-card"><div class="trend-rank">3</div><div style="flex:1;"><div class="skeleton" style="width:70%;margin-bottom:8px;"></div><div class="skeleton" style="width:45%;height:10px;"></div></div></div>

    <!-- Music -->
    <div class="trend-section" id="music-section">

      <div class="trend-grid" id="music-grid">

        <div class="loading-card"><div class="trend-rank">2</div><div style="flex:1;"><div class="skeleton" style="width:65%;margin-bottom:8px;"></div><div class="skeleton" style="width:30%;height:10px;"></div></div></div>

      </div>

    <!-- X / Twitter real-time trends (Claude-generated) -->
    <div class="trend-section" id="x-section" style="display:none;">
      <div class="trend-section-title" style="display:flex;align-items:center;justify-content:space-between;gap:12px;">
        <span>𝕏 今のトレンド（AI 推定）</span>
        <button id="x-refresh-btn" onclick="loadXTrends(true)" style="background:transparent;border:1px solid rgba(201,168,76,0.4);color:#c9a84c;padding:6px 14px;border-radius:16px;font-size:12px;font-family:inherit;cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:all 0.15s;">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 4v6h-6"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
          <span>更新</span>
        </button>
      </div>
      <div id="x-meta" style="color:var(--text-muted);font-size:11px;margin-bottom:10px;">—</div>
      <div class="trend-grid" id="x-grid"></div>

<script src="/eleva-i18n.js?v=20260419"></script>
<script src="/eleva-shared.js?v=20260419"></script>
<script src="/eleva-tz.js?v=20260419"></script>
<script>
let currentPlatform='tiktok';
let currentPeriod='daily';

function selectPlatform(el){
  document.querySelectorAll('#platform-tabs .tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  currentPlatform=el.dataset.platform;
  const isX=currentPlatform==='x';
  // X has its own layout: Claude-generated topic cards only.
  document.getElementById('music-section').style.display=isX?'none':'block';
  document.querySelectorAll('#trend-content .trend-section').forEach(s=>{
    if(s.id==='x-section')s.style.display=isX?'block':'none';
    else if(isX)s.style.display='none';
    else if(s.id!=='music-section')s.style.display='block';
  });
  loadTrends();
}

function selectPeriod(el){
  document.querySelectorAll('#period-tabs .tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  currentPeriod=el.dataset.period;
  loadTrends();
}

function numberFormat(n){
  if(!n)return '';
  if(n>=1000000)return (n/1000000).toFixed(1)+'M';
  if(n>=1000)return (n/1000).toFixed(0)+'K';
  return n.toString();
}

const X_CATEGORY_COLOR={
  '時事':'#6ea8fe','政治':'#6ea8fe','スポーツ':'#4ade80','エンタメ':'#f472b6',
  'ビジネス':'#c9a84c','経済':'#c9a84c','テック':'#a78bfa','カルチャー':'#fbbf24','ミーム':'#fb923c',
};
const X_HEAT_LABEL={high:'🔥 急上昇',medium:'📈 上昇中',low:'🌱 注目'};

async function loadXTrends(forceRefresh){
  const grid=document.getElementById('x-grid');
  const meta=document.getElementById('x-meta');
  const btn=document.getElementById('x-refresh-btn');
  if(!grid)return;
  grid.innerHTML='<div style="color:var(--text-muted);text-align:center;padding:24px;font-size:13px;grid-column:1/-1;">Claude が推定中…（5〜10秒）</div>';
  if(btn){btn.disabled=true;btn.style.opacity='0.6';}
  meta.textContent='AI 推定トレンド（更新中…）';
  try{
    const lang=(localStorage.getItem('eleva_lang')||'ja').toLowerCase();
    const res=await fetch('/api/generate-x-trends',{
      method:'POST',
      cache:forceRefresh?'no-store':'default',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({lang,genre:(window.userGenreKeyword||'')}),
    });
    const data=await res.json();
    if(!res.ok||!Array.isArray(data.topics)){
      meta.textContent='生成に失敗しました';
      grid.innerHTML='<div style="color:#bf7f7f;text-align:center;padding:20px;font-size:13px;grid-column:1/-1;">X のトレンドを生成できませんでした: '+(data.error||'unknown')+'</div>';
      return;
    }
    const when=data.generated_at?new Date(data.generated_at).toLocaleString('ja-JP',{hour:'2-digit',minute:'2-digit'}):'';
    meta.textContent='Claude 推定・'+data.topics.length+'件'+(when?'・'+when+' 更新':'')+'（実データではなく AI による推定です）';
    grid.innerHTML=data.topics.map((t,i)=>{
      const cat=String(t.category||'トレンド').slice(0,8);
      const col=X_CATEGORY_COLOR[cat]||'#c9a84c';
      const heat=X_HEAT_LABEL[t.heat]||'';
      const tag=t.hashtag?String(t.hashtag).replace(/^#?/,'#'):'';
      return `<div class="trend-card">
        <span class="trend-rank">${i+1}</span>
        <div class="trend-body">
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px;flex-wrap:wrap;">
            <span style="background:${col}22;color:${col};border:1px solid ${col}55;font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;">${cat}</span>
            ${heat?`<span style="color:var(--text-muted);font-size:10px;">${heat}</span>`:''}
          </div>
          <div class="trend-name">${escapeHtml(String(t.title||'').slice(0,60))}</div>
          <div class="trend-meta" style="margin-top:3px;">${escapeHtml(String(t.description||'').slice(0,90))}</div>
          ${tag?`<div style="color:#c9a84c;font-size:11px;margin-top:6px;">${escapeHtml(tag)}</div>`:''}
        </div>
      </div>`;
    }).join('');
  }catch(e){
    meta.textContent='通信エラー';
    grid.innerHTML='<div style="color:#bf7f7f;text-align:center;padding:20px;font-size:13px;grid-column:1/-1;">'+escapeHtml(String(e.message||e))+'</div>';
  }finally{
    if(btn){btn.disabled=false;btn.style.opacity='1';}
  }
}

async function loadTrends(){
  if(currentPlatform==='x'){
    loadXTrends(false);
    return;
  }
  // Reset
  ['hashtag-grid','music-grid','topic-grid'].forEach(id=>{
    const el=document.getElementById(id);
    if(el)el.innerHTML='<div style="color:var(--text-muted);text-align:center;padding:20px;font-size:13px;">読み込み中...</div>';
  });

  try{
    const lang=(localStorage.getItem('eleva_lang')||'ja').toLowerCase();
    // Primary: get-localized-trends (region-aware, 23 langs)
    const url=ELEVA.SUPABASE_URL+'/functions/v1/get-localized-trends?locale='+encodeURIComponent(lang)+'&platform='+currentPlatform+'&limit=20';
    const res=await fetch(url,{
      headers:{'apikey':ELEVA.SUPABASE_ANON_KEY,'Authorization':'Bearer '+ELEVA.SUPABASE_ANON_KEY}
    });
    const data=await res.json();
    const t=data.trends||{};
    // Per the new endpoint shape: trends.youtube[], trends.global_buzz[], trends.keywords[]
    const platformList=t[currentPlatform]||t.youtube||[];
    const hashtagPool=t.keywords||t.hashtags||platformList.flatMap(p=>p.hashtags||[]);
    const topicsPool=t.global_buzz||platformList.map(p=>({topic:p.title||p.name,description:p.description||p.snippet||''}));
    const musicPool=t.music||t.trending_music||[];
    renderHashtags(prioritizeByGenre(hashtagPool.length?hashtagPool:generateFallbackHashtags()));
    renderMusic(musicPool.length?musicPool:generateFallbackMusic());
    renderTopics(prioritizeByGenre(topicsPool.length?topicsPool:generateFallbackTopics()));
  }catch(e){
    console.warn('[trends] localized fetch failed, falling back',e);
    renderHashtags(generateFallbackHashtags());
    renderMusic(generateFallbackMusic());
    renderTopics(generateFallbackTopics());
  }
}

function renderHashtags(items){
  const el=document.getElementById('hashtag-grid');
  if(!el)return;
  el.innerHTML=items.slice(0,10).map((h,i)=>`
    <div class="trend-card" onclick="useHashtag('${h.tag||h.name||h}')">
      <span class="trend-rank">${i+1}</span>
      <span class="trend-icon">#</span>
      <div class="trend-body">
        <div class="trend-name"><span class="hash-symbol">#</span>${(h.tag||h.name||h).replace('#','')}${h.rising?'<span class="trend-badge">急上昇</span>':''}</div>
        <div class="trend-meta">${h.usage_count||h.count?numberFormat(h.usage_count||h.count)+' 件の投稿':''}</div>
      </div>
    </div>`).join('');
}

function renderMusic(items){
  const el=document.getElementById('music-grid');
  if(!el)return;
  el.innerHTML=items.slice(0,8).map((m,i)=>`
    <div class="trend-card">
      <span class="trend-rank">${i+1}</span>
      <span class="music-note">♪</span>
      <div class="trend-body">
        <div class="trend-name">${m.title||m.name||m}</div>
        <div class="trend-meta">${m.artist||m.author||''}</div>
      </div>
      <span class="trend-count">${m.video_count||m.count?numberFormat(m.video_count||m.count)+'本':''}</span>
    </div>`).join('');
}

const TOPIC_PAGE_MAP={
  'AI動画生成トレンド':'/trend-ai-video.html',
  'ショート動画の収益化':'/short-video-monetization.html',
  'バズる投稿の条件':'/buzz-conditions.html',
};
function extractTopicText(t){
  // API may return strings, objects with various key names, or nested objects.
  if(t==null)return {title:'',desc:''};
  if(typeof t==='string')return {title:t,desc:''};
  const title=t.title||t.topic||t.name||t.headline||t.label||'';
  const desc=t.description||t.desc||t.summary||t.snippet||t.subtitle||'';
  // Guard against non-scalar values that would otherwise print as [object Object]
  const str=v=>(v&&typeof v==='object')?(v.text||v.value||JSON.stringify(v)):String(v||'');
  return {title:str(title),desc:str(desc)};
}
function renderTopics(items){
  const el=document.getElementById('topic-grid');
  if(!el)return;
  el.innerHTML=items.slice(0,6).map(t=>{
    const {title,desc}=extractTopicText(t);
    const page=TOPIC_PAGE_MAP[title];
    const safeTitle=title.replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
    const safeDesc=desc.replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
    const cta=page?`style="cursor:pointer;" onclick="location.href='${page}'"`:'';
    return `
    <div class="trend-card" ${cta}>
      <div class="trend-body">
        <div class="trend-name">${safeTitle||'(タイトルなし)'}${page?' <span style="color:var(--gold);font-size:11px;">›</span>':''}</div>
        <div class="trend-meta">${safeDesc}</div>
      </div>
    </div>`;
  }).join('');
}

function useHashtag(tag){
  localStorage.setItem('eleva_draft_hashtag',tag);
  if(confirm('#'+tag.replace('#','')+'をプロンプトに使用しますか？')){
    window.location.href='/dashboard.html';
  }
}

function generateFallbackHashtags(){
  const byPlatform={

// ── Mobile hamburger ──
function toggleMobileNav(){
  const sheet=document.getElementById('m-sheet');
  const scrim=document.getElementById('m-scrim');
  if(!sheet||!scrim)return;
  const open=sheet.classList.toggle('open');
  scrim.classList.toggle('open',open);
}
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){
    const sheet=document.getElementById('m-sheet');
    if(sheet&&sheet.classList.contains('open'))toggleMobileNav();
  }
});

// User's custom / selected genre keyword — used to prioritize matching topics
window.userGenreKeyword='';
function prioritizeByGenre(items){
  const kw=(window.userGenreKeyword||'').toLowerCase().trim();
  if(!kw||!Array.isArray(items))return items;
  const hit=[],miss=[];
  items.forEach(it=>{
    const blob=JSON.stringify(it||'').toLowerCase();
    (blob.includes(kw)?hit:miss).push(it);
  });
  return hit.concat(miss);
}

async function loadUserGenrePreference(){
  try{
    const sb=ELEVA.getSupabase();
    const {data:{user}}=await sb.auth.getUser();
    if(!user)return;
    const {data:prof}=await sb.from('profiles').select('custom_genre,selected_genres').eq('id',user.id).single();
    const kw=prof?.custom_genre||(Array.isArray(prof?.selected_genres)&&prof.selected_genres[0])||'';
    window.userGenreKeyword=kw||'';
    if(kw){
      const hint=document.getElementById('user-genre-hint');
      if(hint){hint.style.display='inline-flex';hint.querySelector('span[data-genre-val]').textContent=kw;}
    }
  }catch(e){/* soft-fail */}
}

document.addEventListener('DOMContentLoaded',async()=>{
  await ELEVA.initElevaPage({page:'trend'});
  ELEVA.applyLanguage(localStorage.getItem('eleva_lang')||'ja');
  await loadUserGenrePreference();
  loadTrends();
});
