<style>
:root{
  --bg:#0a0a0a;--bg-2:#0f0f0f;--bg-3:#161616;--border:#1f1f1f;--border-gold:rgba(212,175,55,0.22);
  --gold:#d4af37;--gold-2:#b8941f;--gold-soft:rgba(212,175,55,0.12);
  --text:#e8e8e8;--text-2:#a8a8a8;--text-3:#6b6b6b;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Inter','Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased;padding-bottom:60px;}
a{color:inherit;text-decoration:none;}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}
::-webkit-scrollbar{width:8px;height:8px;}
::-webkit-scrollbar-thumb{background:rgba(212,175,55,0.25);border-radius:4px;}

.nav{position:sticky;top:0;z-index:50;background:rgba(10,10,10,0.88);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);}
.nav-inner{max-width:1200px;margin:0 auto;padding:14px 22px;display:flex;align-items:center;justify-content:space-between;gap:14px;}
.brand{font-weight:800;font-size:18px;letter-spacing:2px;color:var(--gold);}
.nav-back{color:var(--text-3);font-size:12px;border:1px solid var(--border);padding:6px 14px;border-radius:8px;}
.nav-back:hover{color:var(--gold);border-color:var(--gold);}

.page{max-width:1200px;margin:0 auto;padding:36px 22px;}
.h1{display:flex;align-items:center;gap:12px;font-size:26px;font-weight:800;letter-spacing:.5px;margin-bottom:6px;}
.h1 .world-ic{color:var(--gold);}
.lead{color:var(--text-2);font-size:13px;line-height:1.7;margin-bottom:28px;}

/* Filter bar */
.filter-bar{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-bottom:18px;}
.select{background:var(--bg-3);border:1px solid var(--border);color:var(--text);padding:10px 34px 10px 14px;border-radius:10px;font-size:13px;font-family:inherit;outline:none;cursor:pointer;appearance:none;background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23d4af37' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><polyline points='6 9 12 15 18 9'/></svg>");background-repeat:no-repeat;background-position:right 10px center;background-size:14px;}
.select:focus{border-color:var(--gold);}

/* Genre tabs */
.tabs{display:flex;gap:6px;overflow-x:auto;padding-bottom:6px;margin-bottom:24px;border-bottom:1px solid var(--border);}
.tab{padding:10px 16px;font-size:13px;color:var(--text-2);letter-spacing:.3px;border-radius:8px 8px 0 0;white-space:nowrap;border-bottom:2px solid transparent;margin-bottom:-1px;transition:color .15s,border-color .15s;flex-shrink:0;}
.tab:hover{color:var(--gold);}
.tab.active{color:var(--gold);border-bottom-color:var(--gold);font-weight:600;}

/* Cards */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:16px;}
.card{background:var(--bg-3);border:1px solid var(--border);border-radius:14px;overflow:hidden;transition:transform .15s,border-color .15s,box-shadow .15s;display:flex;flex-direction:column;}
.card:hover{transform:translateY(-3px);border-color:var(--gold);box-shadow:0 4px 22px rgba(212,175,55,0.12);}
.thumb{position:relative;aspect-ratio:9/16;background:linear-gradient(135deg,#161616,#0f0f0f);overflow:hidden;cursor:pointer;}
.thumb img{width:100%;height:100%;object-fit:cover;display:block;}
.thumb .no-img{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:var(--text-3);font-size:11px;letter-spacing:1px;}
.badge{position:absolute;top:8px;left:8px;padding:4px 10px 4px 8px;background:rgba(10,10,10,0.82);border:1px solid var(--border-gold);color:var(--gold);font-size:10px;font-weight:700;letter-spacing:.5px;border-radius:999px;display:inline-flex;align-items:center;gap:5px;text-transform:uppercase;}
.badge svg{width:11px;height:11px;}

.body{padding:12px 14px 14px;display:flex;flex-direction:column;gap:6px;flex:1;}
.card-title{color:var(--text);font-size:13px;line-height:1.45;font-weight:500;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;min-height:38px;}
.card-author{color:var(--text-3);font-size:11px;}
.card-stats{display:flex;gap:12px;color:var(--text-2);font-size:11px;align-items:center;margin-top:2px;}
.card-stats .stat{display:inline-flex;align-items:center;gap:4px;}
.card-stats svg{width:11px;height:11px;color:var(--gold);}
.card-music{display:flex;align-items:center;gap:6px;color:var(--gold);font-size:10.5px;margin-top:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.card-music svg{width:11px;height:11px;flex-shrink:0;}
.card-music span{overflow:hidden;text-overflow:ellipsis;}
.cta-btn{margin-top:10px;width:100%;background:linear-gradient(135deg,var(--gold),var(--gold-2));color:#050505;padding:10px;border-radius:10px;font-weight:700;font-size:12px;letter-spacing:.5px;display:inline-flex;align-items:center;justify-content:center;gap:6px;transition:transform .12s,box-shadow .15s;}
.cta-btn:hover{transform:translateY(-1px);box-shadow:0 4px 14px rgba(212,175,55,0.3);}
.cta-btn svg{width:12px;height:12px;}

/* Empty / error */
.empty{text-align:center;padding:60px 20px;background:var(--bg-2);border:1px solid var(--border);border-radius:16px;}
.empty .ic{margin:0 auto 14px;color:var(--gold);}
.empty-title{font-size:15px;font-weight:700;margin-bottom:8px;}
.empty-sub{color:var(--text-3);font-size:12px;line-height:1.7;}
.error-banner{background:rgba(191,127,127,0.10);border:1px solid rgba(191,127,127,0.3);color:#bf7f7f;padding:13px 18px;border-radius:10px;font-size:12.5px;margin-bottom:18px;}

.skel{background:linear-gradient(90deg,#161616 25%,#1f1f1f 50%,#161616 75%);background-size:200% 100%;animation:shimmer 1.4s infinite;border-radius:8px;}
@keyframes shimmer{0%{background-position:200% 0;}100%{background-position:-200% 0;}}

footer{margin-top:60px;border-top:1px solid var(--border);padding:24px 20px;text-align:center;color:var(--text-3);font-size:11px;letter-spacing:.5px;}
</style>

</head>

<script>
const SUPABASE_URL='https://syxctolgqhdtcoaothwi.supabase.co';
const SUPABASE_ANON_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN5eGN0b2xncWhkdGNvYW90aHdpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4MDk5NjksImV4cCI6MjA5MDM4NTk2OX0.h38gOPGOcdIw_w8p4AEYVLHCaWuC8k2XRrjLPcFAtUw';

const PLATFORM_ICON={tiktok:'i-tiktok',instagram:'i-instagram',youtube:'i-youtube'};
const PLATFORM_LABEL={tiktok:'TikTok',instagram:'Instagram',youtube:'YouTube'};
const COUNTRY_FLAG={JP:'🇯🇵',US:'🇺🇸',KR:'🇰🇷',TH:'🇹🇭',ID:'🇮🇩',BR:'🇧🇷',MX:'🇲🇽',FR:'🇫🇷',DE:'🇩🇪',IN:'🇮🇳',GB:'🇬🇧',AU:'🇦🇺',CN:'🇨🇳',TW:'🇹🇼',VN:'🇻🇳',PH:'🇵🇭'};
const COUNTRY_NAME_JA={JP:'日本',US:'アメリカ',KR:'韓国',TH:'タイ',ID:'インドネシア',BR:'ブラジル',MX:'メキシコ',FR:'フランス',DE:'ドイツ',IN:'インド',GB:'イギリス',AU:'オーストラリア',CN:'中国',TW:'台湾',VN:'ベトナム',PH:'フィリピン'};
const GENRE_NAME_JA={food:'料理・グルメ',beauty:'美容・コスメ',fashion:'ファッション',travel:'旅行・観光',fitness:'フィットネス',music:'音楽',pet:'ペット',game:'ゲーム',sports:'スポーツ',education:'教育・学習',business_side:'ビジネス・副業',art:'アート・クリエイティブ',lifestyle:'ライフスタイル',news:'ニュース・時事',bike:'バイク・車',comedy:'コメディ',dance:'ダンス'};

// Default to 全世界 (no country filter) per product decision
let state={country:'',genre:'',platform:'',countries:null,genres:null};

function escapeHtml(s){return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function fmtNum(n){n=Number(n||0);if(n>=1e8)return (n/1e8).toFixed(1)+'億';if(n>=1e4)return (n/1e4).toFixed(1)+'万';if(n>=1e3)return (n/1e3).toFixed(1)+'k';return String(n);}

// Best-effort thumbnail: YouTube IDs expose a public CDN endpoint. TikTok/Instagram don't.
function deriveThumb(row){
  if(row.platform==='youtube'&&row.video_id)return 'https://i.ytimg.com/vi/'+encodeURIComponent(row.video_id)+'/hqdefault.jpg';
  const sb=row.storyboard_urls;
  if(Array.isArray(sb)&&sb.length)return sb[0];
  if(sb&&typeof sb==='object'){const v=sb.cover||sb.thumbnail||sb[0];if(v)return v;}
  return '';
}

async function pgrest(path){
  const res=await fetch(SUPABASE_URL+'/rest/v1/'+path,{
    cache:'no-store',
    headers:{apikey:SUPABASE_ANON_KEY,Authorization:'Bearer '+SUPABASE_ANON_KEY,Prefer:'count=exact'},
  });
  if(!res.ok)throw new Error('HTTP '+res.status+' '+(await res.text()).slice(0,120));
  return res.json();
}

async function loadFiltersFromData(){
  // Derive country + genre options from the distinct values currently in the table.
  try{
    const rows=await pgrest('global_buzz_data?archived=not.eq.true&select=country_code,genre&limit=500');
    const cSet=new Set(),gSet=new Set();
    rows.forEach(r=>{if(r.country_code)cSet.add(r.country_code);if(r.genre)gSet.add(r.genre);});
    state.countries=[...cSet].sort();
    state.genres=[...gSet].sort();
    renderCountrySelect();
    renderGenreTabs();
  }catch(e){/* selects stay minimal on failure */}
}

async function loadTrends(){
  const grid=document.getElementById('grid');
  grid.innerHTML=Array.from({length:8}).map(()=>'<div class="skel" style="height:340px;"></div>').join('');

  // Primary: query the table directly (RLS policy "public_read_global_buzz" allows anon SELECT).
  // Include pending rows so titles / genre / platform are visible while analysis catches up.
  const params=new URLSearchParams();
  params.set('archived','not.eq.true');
  params.set('order','views.desc.nullslast,buzz_score.desc.nullslast,buzz_detected_at.desc.nullslast');
  params.set('limit','30');
  params.set('select','id,platform,video_id,video_url,country_code,title,genre,views,likes,music_title,music_artist,buzz_score,analysis_status,storyboard_urls,buzz_detected_at');
  if(state.country)params.append('country_code','eq.'+state.country);
  if(state.platform)params.append('platform','eq.'+state.platform);
  if(state.genre)params.append('genre','eq.'+state.genre);

  let rows;
  try{
    rows=await pgrest('global_buzz_data?'+params.toString());
  }catch(e){
    document.getElementById('content').innerHTML='<div class="error-banner">トレンド取得に失敗しました: '+escapeHtml(e.message||e)+'</div>';
    return;
  }

  if(!state.countries||!state.genres)loadFiltersFromData();

  if(!Array.isArray(rows)||rows.length===0){
    renderEmpty();
    return;
  }
  renderCards(rows);
}

function renderCountrySelect(){
  const sel=document.getElementById('country-select');
  const opts=['<option value="">🌍 全世界</option>'].concat((state.countries||[]).map(code=>{
    const flag=COUNTRY_FLAG[code]||'';
    const name=COUNTRY_NAME_JA[code]||code;
    return '<option value="'+escapeHtml(code)+'">'+flag+' '+escapeHtml(name)+'</option>';
  }));
  sel.innerHTML=opts.join('');
  sel.value=state.country;
}

function renderGenreTabs(){
  const wrap=document.getElementById('genre-tabs');
  const all='<button class="tab'+(state.genre===''?' active':'')+'" data-genre="">すべて</button>';
  const tabs=(state.genres||[]).map(key=>{
    const name=GENRE_NAME_JA[key]||key;
    return '<button class="tab'+(state.genre===key?' active':'')+'" data-genre="'+escapeHtml(key)+'">'+escapeHtml(name)+'</button>';
  }).join('');
  wrap.innerHTML=all+tabs;
  wrap.querySelectorAll('.tab').forEach(btn=>{
    btn.addEventListener('click',()=>{
      state.genre=btn.dataset.genre||'';
      wrap.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      loadTrends();
    });
  });
}

function renderCards(trends){
  document.getElementById('content').innerHTML='<div class="grid" id="grid"></div>';
  document.getElementById('grid').innerHTML=trends.map((t,i)=>{
    const platIcon=PLATFORM_ICON[t.platform]||'i-play';
    const platLabel=PLATFORM_LABEL[t.platform]||t.platform||'';
    const contentUrl=t.video_url||'';
    const thumbUrl=deriveThumb(t);
    const thumb=thumbUrl
      ? '<img src="'+escapeHtml(thumbUrl)+'" loading="lazy" alt="" onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'flex\';"/><div class="no-img" style="display:none;">NO IMAGE</div>'
      : '<div class="no-img">NO IMAGE</div>';
    const music=t.music_title
      ? '<div class="card-music"><svg><use href="#i-music"/></svg><span>'+escapeHtml(t.music_title)+(t.music_artist?' — '+escapeHtml(t.music_artist):'')+'</span></div>'
      : '';
    const openThumb=contentUrl?'onclick="window.open(\''+escapeHtml(contentUrl).replace(/'/g,"\\'")+'\',\'_blank\',\'noopener\')"':'';
    const genreLabel=t.genre?(GENRE_NAME_JA[t.genre]||t.genre):'';
    const countryFlag=t.country_code&&COUNTRY_FLAG[t.country_code]?COUNTRY_FLAG[t.country_code]:'';
    const pendingPill=t.analysis_status&&t.analysis_status!=='done'
      ? '<span class="badge" style="top:auto;bottom:8px;left:8px;right:auto;background:rgba(10,10,10,0.82);border-color:rgba(168,168,168,0.3);color:#a8a8a8;">分析準備中</span>'
      : '';
    return `
      <div class="card">
        <div class="thumb" ${openThumb}>
          ${thumb}
          <span class="badge"><svg><use href="#${platIcon}"/></svg>${escapeHtml(platLabel)}</span>
          ${pendingPill}
        </div>
        <div class="body">
          <div class="card-title">${escapeHtml(t.title||'(無題)')}</div>
          <div class="card-author">${countryFlag?countryFlag+' ':''}${escapeHtml(genreLabel)}</div>
          <div class="card-stats">
            <span class="stat"><svg><use href="#i-eye"/></svg>${fmtNum(t.views)}</span>
            <span class="stat"><svg><use href="#i-heart"/></svg>${fmtNum(t.likes)}</span>
          </div>
          ${music}
          <button class="cta-btn" data-idx="${i}"><svg><use href="#i-arrow"/></svg>この構成で動画を作る</button>
        </div>
      </div>`;
  }).join('');
  // Attach CTA handlers
  document.getElementById('grid').querySelectorAll('.cta-btn').forEach(btn=>{
    btn.addEventListener('click',e=>{
      const idx=Number(btn.dataset.idx);
      const t=trends[idx];
      if(!t)return;
      const id=t.id||t.trend_id||'';
      const q=new URLSearchParams();
      if(t.title)q.set('prompt',t.title);
      q.set('from','trend');
      if(id)q.set('trend_id',id);
      location.href='/dashboard.html?'+q.toString();
    });
  });
}

function renderEmpty(){
  document.getElementById('content').innerHTML=`
    <div class="empty">
      <svg class="ic" width="38" height="38"><use href="#i-world"/></svg>
      <div class="empty-title">現在データを収集中です</div>
      <div class="empty-sub">まもなくこの国・ジャンルのトレンドが表示されます。<br/>しばらくしてから再度お試しください。</div>
    </div>`;
}

// Filter handlers
document.getElementById('country-select').addEventListener('change',e=>{state.country=e.target.value||'';loadTrends();});
document.getElementById('platform-select').addEventListener('change',e=>{state.platform=e.target.value||'';loadTrends();});

// Boot
document.addEventListener('DOMContentLoaded',loadTrends);
</script>
