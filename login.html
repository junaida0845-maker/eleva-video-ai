<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
<title>ELEVA — ログイン</title>
<meta name="description" content="ELEVAにログインしてAI動画生成を始めましょう。"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--gold:#c9a84c;--gold-light:#f0d070;--gold-dark:#a07830;--black:#0a0a0a;--black-card:#111111;--black-border:#1a1a1a;--border-gold:rgba(201,168,76,0.2);--text-primary:#fff;--text-secondary:#aaa;--text-muted:#666;--text-gold:#c9a84c;}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{overflow-x:hidden;max-width:100vw;}
body{font-family:'Inter',sans-serif;background:var(--black);color:var(--text-primary);min-height:100vh;display:flex;align-items:center;justify-content:center;}
img,video,iframe,table{max-width:100%;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 50% 0%,rgba(201,168,76,0.08) 0%,transparent 70%);pointer-events:none;}
.auth-wrap{width:100%;max-width:420px;padding:20px;}
.auth-logo{text-align:center;margin-bottom:32px;}
.auth-logo a{font-size:28px;font-weight:900;color:var(--gold-light);letter-spacing:0.1em;text-decoration:none;}
.auth-logo p{color:var(--text-secondary);font-size:13px;margin-top:8px;line-height:1.5;}
.auth-card{background:var(--black-card);border:1px solid var(--border-gold);border-radius:20px;padding:36px 32px;}
.auth-tabs{display:flex;margin-bottom:28px;border-bottom:1px solid rgba(255,255,255,0.08);}
.auth-tab{flex:1;padding:12px;text-align:center;cursor:pointer;color:var(--text-muted);font-size:14px;font-weight:500;transition:all 0.2s;border-bottom:2px solid transparent;margin-bottom:-1px;}
.auth-tab.active{color:var(--gold);border-bottom-color:var(--gold);}
.form-group{margin-bottom:18px;}
label{display:block;color:var(--text-secondary);font-size:13px;margin-bottom:6px;}
.input-wrap{position:relative;}
.input-wrap input{width:100%;background:var(--black-border);border:1px solid rgba(201,168,76,0.3);color:#fff;padding:12px 44px 12px 16px;border-radius:10px;font-size:15px;outline:none;transition:border-color 0.2s;font-family:'Inter',sans-serif;}
input{width:100%;background:var(--black-border);border:1px solid rgba(201,168,76,0.3);color:#fff;padding:12px 16px;border-radius:10px;font-size:15px;outline:none;transition:border-color 0.2s;font-family:'Inter',sans-serif;}
input:focus{border-color:var(--gold);}
input::placeholder{color:var(--text-muted);}
.eye-btn{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--text-muted);padding:4px;display:flex;align-items:center;transition:color 0.2s;}
.eye-btn:hover{color:var(--gold);}
.forgot-link{display:block;text-align:right;color:var(--text-muted);font-size:12px;margin-top:6px;text-decoration:none;transition:color 0.2s;cursor:pointer;}
.forgot-link:hover{color:var(--gold);}
.btn-primary{width:100%;background:var(--gold);color:#000;border:none;padding:14px;border-radius:10px;font-weight:700;font-size:15px;cursor:pointer;transition:all 0.2s;margin-top:8px;}
.btn-primary:hover{background:var(--gold-light);}
.btn-primary:disabled{background:#333;color:#666;cursor:not-allowed;}
.error-msg{background:rgba(255,68,68,0.1);border:1px solid rgba(255,68,68,0.3);color:#ff4444;padding:12px 16px;border-radius:8px;font-size:13px;margin-top:12px;display:none;}
.success-msg{background:rgba(68,255,136,0.1);border:1px solid rgba(68,255,136,0.3);color:#44ff88;padding:12px 16px;border-radius:8px;font-size:13px;margin-top:12px;display:none;}
.auth-footer{text-align:center;margin-top:24px;color:var(--text-muted);font-size:13px;}
.auth-footer a{color:var(--gold);text-decoration:none;}
.lang-bar{position:fixed;top:16px;right:16px;z-index:10;}
.lang-bar button{background:rgba(17,17,17,0.9);border:1px solid var(--border-gold);color:var(--gold);padding:8px 14px;border-radius:20px;cursor:pointer;font-size:13px;}
/* リセットモーダル */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.8);display:flex;align-items:center;justify-content:center;z-index:100;display:none;}
.modal-overlay.show{display:flex;}
.modal-box{background:var(--black-card);border:1px solid var(--border-gold);border-radius:20px;padding:32px;width:90%;max-width:380px;}
.modal-box h3{color:var(--gold);font-size:18px;margin-bottom:8px;}
.modal-box p{color:var(--text-secondary);font-size:13px;margin-bottom:20px;line-height:1.6;}
.modal-box input{width:100%;background:var(--black-border);border:1px solid rgba(201,168,76,0.3);color:#fff;padding:12px 16px;border-radius:10px;font-size:15px;outline:none;font-family:'Inter',sans-serif;margin-bottom:12px;}
.modal-box input:focus{border-color:var(--gold);}
.modal-actions{display:flex;gap:10px;}
.btn-cancel{flex:1;background:transparent;border:1px solid rgba(255,255,255,0.1);color:var(--text-muted);padding:12px;border-radius:10px;font-size:14px;cursor:pointer;transition:all 0.2s;}
.btn-cancel:hover{border-color:var(--gold);color:var(--gold);}
.btn-send{flex:2;background:var(--gold);color:#000;border:none;padding:12px;border-radius:10px;font-weight:700;font-size:14px;cursor:pointer;transition:all 0.2s;}
.btn-send:hover{background:var(--gold-light);}
.btn-send:disabled{background:#333;color:#666;cursor:not-allowed;}
</style>
<!-- eleva-sw-register --><script>if('serviceWorker' in navigator){window.addEventListener('load',async()=>{try{const reg=await navigator.serviceWorker.register('/sw.js');reg.addEventListener('updatefound',()=>{const nw=reg.installing;nw.addEventListener('statechange',()=>{if(nw.state==='installed'&&navigator.serviceWorker.controller){nw.postMessage('skipWaiting');navigator.serviceWorker.addEventListener('controllerchange',()=>window.location.reload());}});});setInterval(()=>reg.update(),30*60*1000);}catch(e){console.log('SW registration failed:',e);}});}</script>
</head>
<body>

<div class="lang-bar">
  <button onclick="ELEVA.showLanguageModal()">🌐</button>
</div>

<!-- パスワードリセットモーダル -->
<div class="modal-overlay" id="reset-modal">
  <div class="modal-box">
    <h3 data-i18n="reset_title">パスワードをリセット</h3>
    <p data-i18n="reset_desc">登録済みのメールアドレスを入力してください。パスワード再設定用のリンクをお送りします。</p>
    <input type="email" id="reset-email" data-i18n-ph="email" placeholder="メールアドレス" autocomplete="email"/>
    <div class="error-msg" id="reset-error"></div>
    <div class="success-msg" id="reset-success"></div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeResetModal()">キャンセル</button>
      <button class="btn-send" id="btn-reset" onclick="doPasswordReset()">送信</button>
    </div>
  </div>
</div>

<div class="auth-wrap">
  <div class="auth-logo">
    <a href="/">ELEVA</a>
    <p data-i18n="hero_sub">SNS投稿を、もっと賢く、もっとお手軽に。</p>
  </div>

  <div class="auth-card">
    <div class="auth-tabs">
      <div class="auth-tab active" id="tab-login" onclick="switchTab('login')" data-i18n="login">ログイン</div>
      <div class="auth-tab" id="tab-signup" onclick="switchTab('signup')" data-i18n="signup">新規登録</div>
    </div>

    <!-- Login Form -->
    <div id="form-login">
      <div class="form-group">
        <label for="login-email" data-i18n="email">メールアドレス</label>
        <input type="email" id="login-email" data-i18n-ph="email" placeholder="メールアドレス" autocomplete="email"/>
      </div>
      <div class="form-group">
        <label for="login-password" data-i18n="password">パスワード</label>
        <div class="input-wrap">
          <input type="password" id="login-password" data-i18n-ph="password" placeholder="パスワード" autocomplete="current-password"/>
          <button class="eye-btn" type="button" onclick="togglePassword('login-password',this)" tabindex="-1">
            <svg id="eye-login-show" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            <svg id="eye-login-hide" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
          </button>
        </div>
        <span class="forgot-link" onclick="openResetModal()" data-i18n="login_forgot">パスワードをお忘れですか？</span>
      </div>
      <button class="btn-primary" id="btn-login" onclick="doLogin()" data-i18n="login">ログイン</button>
      <div class="error-msg" id="login-error"></div>

      <div style="margin:20px 0;text-align:center;color:#555;font-size:12px;">— <span data-i18n="login_or">または</span> —</div>
      <button onclick="ELEVA.signInWithGoogle()" style="width:100%;padding:14px;background:#fff;color:#333;border:1px solid #ddd;border-radius:10px;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:12px;font-family:inherit;font-weight:500;">
        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="20" height="20" alt="Google">
        <span data-i18n="login_google">Googleでログイン</span>
      </button>
      <button onclick="ELEVA.loginWithBiometrics()" style="width:100%;padding:14px;background:#0D0D0D;color:var(--gold);border:1px solid var(--gold);border-radius:10px;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;font-family:inherit;margin-top:10px;">
        🔐 <span data-i18n="login_biometrics">指紋・顔認証でログイン</span>
      </button>
    </div>

    <!-- Signup Form -->
    <div id="form-signup" style="display:none;">
      <div class="form-group">
        <label for="signup-email" data-i18n="email">メールアドレス</label>
        <input type="email" id="signup-email" data-i18n-ph="email" placeholder="メールアドレス" autocomplete="email"/>
      </div>
      <div class="form-group">
        <label for="signup-password" data-i18n="password">パスワード</label>
        <div class="input-wrap">
          <input type="password" id="signup-password" data-i18n-ph="password" placeholder="パスワード（8文字以上）" autocomplete="new-password"/>
          <button class="eye-btn" type="button" onclick="togglePassword('signup-password',this)" tabindex="-1">
            <svg id="eye-signup-show" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            <svg id="eye-signup-hide" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
          </button>
        </div>
      </div>
      <button class="btn-primary" id="btn-signup" onclick="doSignup()" data-i18n="signup">新規登録</button>
      <div class="error-msg" id="signup-error"></div>
      <div class="success-msg" id="signup-success"></div>
    </div>
  </div>

  <div class="auth-footer">
    <a href="/" data-i18n="back_to_top">← トップページに戻る</a>
  </div>
</div>

<script src="/eleva-i18n.js"></script>
<script src="/eleva-shared.js"></script>
<script>
const sb=ELEVA.getSupabase();

function switchTab(tab){
  document.getElementById('tab-login').classList.toggle('active',tab==='login');
  document.getElementById('tab-signup').classList.toggle('active',tab==='signup');
  document.getElementById('form-login').style.display=tab==='login'?'block':'none';
  document.getElementById('form-signup').style.display=tab==='signup'?'block':'none';
}

function togglePassword(inputId, btn){
  const input = document.getElementById(inputId);
  const prefix = inputId === 'login-password' ? 'eye-login' : 'eye-signup';
  const isHidden = input.type === 'password';
  input.type = isHidden ? 'text' : 'password';
  document.getElementById(prefix+'-show').style.display = isHidden ? 'none' : 'inline';
  document.getElementById(prefix+'-hide').style.display = isHidden ? 'inline' : 'none';
}

function openResetModal(){
  const email = document.getElementById('login-email').value;
  if(email) document.getElementById('reset-email').value = email;
  document.getElementById('reset-error').style.display='none';
  document.getElementById('reset-success').style.display='none';
  document.getElementById('btn-reset').disabled=false;
  document.getElementById('btn-reset').textContent='送信';
  document.getElementById('reset-modal').classList.add('show');
}

function closeResetModal(){
  document.getElementById('reset-modal').classList.remove('show');
}

async function doPasswordReset(){
  const email = document.getElementById('reset-email').value.trim();
  const btn = document.getElementById('btn-reset');
  const err = document.getElementById('reset-error');
  const suc = document.getElementById('reset-success');
  err.style.display='none'; suc.style.display='none';
  if(!email){err.textContent='メールアドレスを入力してください';err.style.display='block';return;}
  btn.disabled=true; btn.textContent='送信中...';
  const {error} = await sb.auth.resetPasswordForEmail(email, {
    redirectTo: window.location.origin + '/reset-password.html'
  });
  if(error){err.textContent=error.message;err.style.display='block';btn.disabled=false;btn.textContent='送信';return;}
  suc.textContent='パスワード再設定メールを送信しました。メールをご確認ください。';
  suc.style.display='block';
  btn.textContent='送信済み';
  setTimeout(()=>closeResetModal(), 3000);
}

async function doLogin(){
  const email=document.getElementById('login-email').value;
  const password=document.getElementById('login-password').value;
  const btn=document.getElementById('btn-login');
  const err=document.getElementById('login-error');
  if(!email||!password){showError(err,'メールとパスワードを入力してください');return;}
  btn.disabled=true;btn.textContent='ログイン中...';err.style.display='none';
  const {error,data}=await sb.auth.signInWithPassword({email,password});
  if(error){showError(err,error.message);btn.disabled=false;btn.textContent='ログイン';return;}
  window.location.href='/dashboard.html';
}

async function doSignup(){
  const email=document.getElementById('signup-email').value;
  const password=document.getElementById('signup-password').value;
  const btn=document.getElementById('btn-signup');
  const err=document.getElementById('signup-error');
  const suc=document.getElementById('signup-success');
  if(!email||!password||password.length<8){showError(err,'メールと8文字以上のパスワードを入力してください');return;}
  btn.disabled=true;btn.textContent='登録中...';err.style.display='none';suc.style.display='none';
  const {error}=await sb.auth.signUp({email,password});
  if(error){showError(err,error.message);btn.disabled=false;btn.textContent='新規登録';return;}
  fetch('/api/send-welcome-email',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email})}).catch(()=>{});
  suc.textContent='確認メールを送信しました。メールをご確認ください。';suc.style.display='block';
  btn.disabled=false;btn.textContent='新規登録';
}

function showError(el,msg){el.textContent=msg;el.style.display='block';}

document.addEventListener('DOMContentLoaded',async()=>{
  ELEVA.initElevaPage({page:'login',requireAuth:false,redirectIfAuth:true});
  ELEVA.applyLanguage(localStorage.getItem('eleva_lang')||'ja');
  if(window.location.hash==='#signup')switchTab('signup');

  // Surface OAuth errors coming back in the URL (?error= or #error=)
  try{
    const hashParams=new URLSearchParams((location.hash||'').replace(/^#/,''));
    const queryParams=new URLSearchParams(location.search||'');
    const errCode=hashParams.get('error')||queryParams.get('error');
    const errDesc=hashParams.get('error_description')||queryParams.get('error_description');
    if(errCode){
      const el=document.getElementById('login-error');
      if(el){
        el.textContent='Google ログインに失敗しました: '+(errDesc||errCode);
        el.style.display='block';
      }
      // Clean URL so the error doesn't persist on reload
      history.replaceState(null,'',location.pathname);
    }
  }catch(e){/* ignore */}
  document.getElementById('login-password').addEventListener('keypress',e=>{if(e.key==='Enter')doLogin();});
  document.getElementById('signup-password').addEventListener('keypress',e=>{if(e.key==='Enter')doSignup();});
  document.getElementById('reset-modal').addEventListener('click',e=>{if(e.target===document.getElementById('reset-modal'))closeResetModal();});

  // Auto biometrics (silent attempt)
  if(localStorage.getItem('eleva_webauthn_registered')&&window.PublicKeyCredential){
    try{
      const challenge=new Uint8Array(32);crypto.getRandomValues(challenge);
      const cred=await navigator.credentials.get({publicKey:{challenge,timeout:30000,userVerification:'required',rpId:window.location.hostname},mediation:'conditional'});
      if(cred){
        const credId=btoa(String.fromCharCode(...new Uint8Array(cred.rawId)));
        const {data:prof}=await sb.from('profiles').select('email').eq('webauthn_credential_id',credId).single();
        if(prof?.email){await sb.auth.signInWithOtp({email:prof.email});}
      }
    }catch(e){/* silent fail */}
  }
});
</script>
</body>
</html>
