<title>ELEVA — SNS 成長診断を無料で受ける</title>

<style>
:root{
  --bg:#0a0a0a;--bg-2:#0f0f0f;--bg-3:#161616;--border:#1f1f1f;--border-gold:rgba(212,175,55,0.2);
  --gold:#d4af37;--gold-2:#b8941f;--gold-soft:rgba(212,175,55,0.12);
  --text:#e8e8e8;--text-2:#a8a8a8;--text-3:#6b6b6b;
  --ok:#7fbf7f;--ok-soft:rgba(127,191,127,0.10);--ok-line:rgba(127,191,127,0.35);
  --err:#bf7f7f;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Inter','Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased;padding-bottom:60px;}
a{color:var(--gold);text-decoration:none;}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}

.nav{position:sticky;top:0;z-index:50;background:rgba(10,10,10,0.85);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);}
.nav-inner{max-width:780px;margin:0 auto;padding:14px 22px;display:flex;align-items:center;justify-content:space-between;}
.brand{font-weight:800;font-size:18px;letter-spacing:2px;color:var(--gold);}
.nav-skip{color:var(--text-3);font-size:12px;border:1px solid var(--border);padding:6px 14px;border-radius:8px;}
.nav-skip:hover{border-color:var(--gold);color:var(--gold);}

.page{max-width:780px;margin:0 auto;padding:40px 22px;}
.h1{font-size:26px;font-weight:800;letter-spacing:.5px;line-height:1.3;margin-bottom:10px;}
.h1 .gold{color:var(--gold);}
.lead{color:var(--text-2);font-size:13px;line-height:1.8;margin-bottom:8px;}
.lead .free{color:var(--ok);}

.progress{height:4px;background:var(--bg-3);border-radius:2px;overflow:hidden;margin:20px 0 10px;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--gold-2));transition:width .45s ease;width:0%;}
.progress-note{color:var(--text-3);font-size:12px;margin-bottom:28px;}

/* Platform grid */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;}
.card{background:var(--bg-3);border:1px solid var(--border);border-radius:14px;padding:22px 16px 18px;display:flex;flex-direction:column;align-items:center;gap:8px;cursor:pointer;transition:border-color .15s,transform .15s,background .15s;text-align:center;color:var(--text);}
.card:hover{border-color:var(--gold);transform:translateY(-2px);}
.card.approved{border-color:var(--ok-line);background:var(--ok-soft);}
.card .plat-icon{color:var(--gold);}
.card.approved .plat-icon{color:var(--ok);}
.plat-name{font-size:14px;font-weight:600;letter-spacing:.5px;color:var(--text);}
.status-pill{font-size:10px;padding:3px 10px;border-radius:999px;letter-spacing:.5px;text-transform:uppercase;font-weight:700;}
.status-not_started{color:var(--text-3);background:rgba(255,255,255,0.04);}
.status-applied,.status-pending{color:var(--gold);background:var(--gold-soft);}
.status-approved{color:var(--ok);background:var(--ok-soft);border:1px solid var(--ok-line);}
.status-rejected{color:var(--err);background:rgba(191,127,127,0.1);}
.wait-meta{color:var(--text-3);font-size:10.5px;line-height:1.5;}

/* Guide */
.back-btn{background:none;border:none;color:var(--text-2);font-size:12px;padding:6px 0;margin-bottom:18px;display:inline-flex;align-items:center;gap:6px;}
.back-btn:hover{color:var(--gold);}
.wait-note{background:var(--gold-soft);border:1px solid var(--border-gold);padding:12px 16px;border-radius:10px;display:flex;gap:10px;color:var(--text);font-size:12.5px;line-height:1.7;margin-bottom:12px;}
.free-banner{background:var(--ok-soft);border:1px solid var(--ok-line);padding:10px 16px;border-radius:10px;display:flex;gap:8px;color:var(--ok);font-size:12px;align-items:center;margin-bottom:26px;}
.guide-title{font-size:18px;font-weight:700;letter-spacing:.5px;margin-bottom:14px;}
.step-list{list-style:none;padding:0;margin-bottom:24px;}
.step-item{display:flex;gap:12px;padding:12px 0;border-bottom:1px solid rgba(255,255,255,0.04);font-size:13.5px;color:var(--text);line-height:1.65;}
.step-item:last-child{border-bottom:none;}
.step-num{background:var(--gold-soft);color:var(--gold);width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;margin-top:1px;}

.action-area{margin-top:18px;}
.apply-btn{display:inline-flex;align-items:center;gap:8px;background:linear-gradient(135deg,var(--gold),var(--gold-2));color:#0a0a0a;padding:13px 24px;border-radius:10px;font-weight:700;font-size:13.5px;letter-spacing:.5px;text-decoration:none;transition:transform .15s,box-shadow .15s;}
.apply-btn:hover{transform:translateY(-1px);box-shadow:0 4px 18px rgba(212,175,55,0.3);}
.mark-btn{width:100%;background:transparent;border:1px solid var(--gold);color:var(--gold);padding:13px;border-radius:10px;font-size:13.5px;font-weight:700;letter-spacing:.5px;margin-top:16px;transition:background .15s;}
.mark-btn:hover:not(:disabled){background:var(--gold-soft);}
.mark-btn:disabled{opacity:.5;cursor:not-allowed;}
.then-label{color:var(--text-3);font-size:11.5px;margin-top:14px;letter-spacing:.3px;}

.pending-box{background:var(--gold-soft);border:1px solid var(--border-gold);padding:16px;border-radius:12px;}
.pending-lead{color:var(--gold);font-size:13px;font-weight:600;margin-bottom:12px;}
.key-form-toggle{background:linear-gradient(135deg,var(--gold),var(--gold-2));color:#0a0a0a;padding:11px 22px;border-radius:10px;font-size:13px;font-weight:700;letter-spacing:.5px;}
.key-form{display:flex;flex-direction:column;gap:10px;margin-top:10px;}
.input{background:var(--bg);border:1px solid var(--border-gold);color:var(--text);padding:11px 14px;font-size:13px;border-radius:8px;outline:none;font-family:inherit;}
.input:focus{border-color:var(--gold);}
.save-btn{background:linear-gradient(135deg,var(--gold),var(--gold-2));color:#0a0a0a;padding:13px;border-radius:10px;font-weight:700;font-size:13px;letter-spacing:.5px;border:none;}
.save-btn:disabled{opacity:.5;cursor:not-allowed;}

.approved-box{background:var(--ok-soft);border:1px solid var(--ok-line);padding:14px 18px;border-radius:10px;display:flex;align-items:center;gap:10px;color:var(--ok);font-size:13px;}

/* Done */
.done-wrap{text-align:center;padding:30px 10px;}
.done-icon{width:64px;height:64px;margin:0 auto 18px;color:var(--gold);}
.done-actions{display:flex;flex-direction:column;gap:12px;align-items:center;margin-top:24px;}

.skel{background:linear-gradient(90deg,#161616 25%,#1f1f1f 50%,#161616 75%);background-size:200% 100%;animation:shimmer 1.4s infinite;border-radius:8px;}
@keyframes shimmer{0%{background-position:200% 0;}100%{background-position:-200% 0;}}
.error-banner{background:rgba(191,127,127,0.10);border:1px solid rgba(191,127,127,0.3);color:var(--err);padding:13px 18px;border-radius:10px;font-size:12.5px;line-height:1.6;margin-bottom:16px;}

footer{margin-top:60px;border-top:1px solid var(--border);padding:24px 20px;text-align:center;color:var(--text-3);font-size:11px;letter-spacing:.5px;}
</style>

</head>

<script>
const SUPABASE_URL='https://syxctolgqhdtcoaothwi.supabase.co';
const SUPABASE_ANON_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN5eGN0b2xncWhkdGNvYW90aHdpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4MDk5NjksImV4cCI6MjA5MDM4NTk2OX0.h38gOPGOcdIw_w8p4AEYVLHCaWuC8k2XRrjLPcFAtUw';

const STATUS_LABEL={
  not_started:{text:'未申請',cls:'not_started'},
  applied:{text:'申請済み・審査中',cls:'applied'},
  pending:{text:'審査中',cls:'pending'},
  approved:{text:'承認済み',cls:'approved'},
  rejected:{text:'却下',cls:'rejected'},
};
const PLATFORM_NAME={tiktok:'TikTok',instagram:'Instagram',youtube:'YouTube',x:'X (Twitter)'};

let sb=null, token=null, data=null, step='select', selected=null;
let markingApplied=false, savingKeys=false, showKeyForm=false;
let apiKey='', apiSecret='';

function escapeHtml(s){return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}

async function callApi(path, method='GET', body=null){
  const res=await fetch(SUPABASE_URL+'/functions/v1/'+path,{
    method,
    cache:'no-store',
    headers:{
      'Content-Type':'application/json',
      Authorization:'Bearer '+(token||SUPABASE_ANON_KEY),
      apikey:SUPABASE_ANON_KEY,
    },
    body:body?JSON.stringify(body):undefined,
  });
  const text=await res.text();
  try{return JSON.parse(text);}catch{return {error:'parse_failed',raw:text,status:res.status};}
}

async function loadStatus(){
  data=await callApi('sns-apply','GET');
  render();
}

async function handleMarkApplied(platformKey){
  markingApplied=true; render();
  await callApi('sns-apply','POST',{platform:platformKey,action:'mark_applied'});
  markingApplied=false;
  step='done';
  await loadStatus(); // re-renders
}

async function handleSaveKeys(platformKey){
  if(!apiKey.trim())return;
  savingKeys=true; render();
  await callApi('sns-apply','POST',{
    platform:platformKey,
    action:'save_keys',
    api_key:apiKey.trim(),
    api_secret:apiSecret.trim()||undefined,
  });
  savingKeys=false;
  showKeyForm=false;
  apiKey=''; apiSecret='';
  await loadStatus();
}

function goGuide(key){selected=key; step='guide'; showKeyForm=false; apiKey=''; apiSecret=''; render();}
function goSelect(){selected=null; step='select'; render();}
function openKeyForm(){showKeyForm=true; render();}
function closeKeyForm(){showKeyForm=false; apiKey=''; apiSecret=''; render();}

// ──────── Renderers ────────
function render(){
  const page=document.getElementById('page');
  if(!data){page.innerHTML='<div class="error-banner">状況の取得に失敗しました。</div>';return;}
  if(data.error){page.innerHTML='<div class="error-banner">API エラー: '+escapeHtml(data.error)+'</div>';return;}
  const platforms=data.platforms||[];
  const applied=platforms.filter(p=>p.status&&p.status!=='not_started').length;
  const approved=platforms.filter(p=>p.status==='approved').length;
  const total=platforms.length||4;

  if(step==='select'){
    page.innerHTML=renderHeader(applied,approved,total)+`
      <div class="grid">
        ${platforms.map(renderCard).join('')}
      </div>
    `;
    return;
  }
  if(step==='guide'&&selected){
    const p=platforms.find(x=>x.key===selected);
    if(!p){goSelect();return;}
    page.innerHTML=renderHeader(applied,approved,total)+renderGuide(p);
    return;
  }
  if(step==='done'){
    page.innerHTML=renderHeader(applied,approved,total)+renderDone();
    return;
  }
}

function renderHeader(applied,approved,total){
  const pct=Math.min(100,Math.round((applied/Math.max(1,total))*100));
  const note=approved>0?`${approved}個の SNS 連携完了 — 診断実行可能`:
             applied>0?`${applied}個の SNS で申請済み — 承認待ち中`:
             '申請したい SNS を選んでください';
  return `
    <h1 class="h1">SNS 成長診断を<span class="gold">無料で受ける</span></h1>
    <p class="lead">使っている SNS の API を連携すると AI があなたのアカウントを分析します。<br/>
      <span class="free">申請中でも無料プラン（動画 3 本/月）はそのまま使えます。</span>
    </p>
    ${applied>0?`<div class="progress"><div class="progress-fill" style="width:${pct}%"></div></div>`:''}
    <p class="progress-note">${escapeHtml(note)}</p>
  `;
}

function renderCard(p){
  const s=STATUS_LABEL[p.status]||STATUS_LABEL.not_started;
  const approvedClass=p.status==='approved'?' approved':'';
  const icon=p.key&&['tiktok','instagram','youtube','x'].includes(p.key)?`<svg class="plat-icon" width="28" height="28"><use href="#i-${p.key}"/></svg>`:'';
  const wait=p.status==='not_started'
    ? `審査期間: ${p.wait_days_min===0?'即日〜':p.wait_days_min+'〜'}${p.wait_days_max||'?'}営業日`
    : p.applied_at
      ? `申請日: ${new Date(p.applied_at).toLocaleDateString('ja-JP')}`
      : '';
  return `
    <button class="card${approvedClass}" onclick="goGuide('${escapeHtml(p.key)}')">
      ${icon}
      <div class="plat-name">${escapeHtml(p.name||PLATFORM_NAME[p.key]||p.key)}</div>
      <div class="status-pill status-${s.cls}">${escapeHtml(s.text)}</div>
      <div class="wait-meta">${escapeHtml(wait)}</div>
    </button>
  `;
}

function renderGuide(p){
  const steps=Array.isArray(p.steps)?p.steps:[];
  const waitNote=p.wait_note||'';
  return `
    <button class="back-btn" onclick="goSelect()"><svg width="13" height="13"><use href="#i-back"/></svg> 戻る</button>
    ${waitNote?`<div class="wait-note">
      <svg width="15" height="15" style="color:var(--gold);flex-shrink:0;margin-top:2px;"><use href="#i-clock"/></svg>
      <span>${escapeHtml(waitNote)}</span>
    </div>`:''}
    <div class="free-banner"><svg width="13" height="13"><use href="#i-check"/></svg>申請中も無料プランは継続して使えます。</div>

    <h2 class="guide-title">${escapeHtml(p.name||PLATFORM_NAME[p.key]||p.key)} — 申請手順</h2>
    <ol class="step-list">
      ${steps.map((s,i)=>`<li class="step-item"><span class="step-num">${i+1}</span><span>${escapeHtml(s)}</span></li>`).join('')}
    </ol>

    ${renderGuideActions(p)}
  `;
}

function renderGuideActions(p){
  if(p.status==='not_started'||p.status==='rejected'){
    return `
      <div class="action-area">
        <a class="apply-btn" href="${escapeHtml(p.apply_url||'#')}" target="_blank" rel="noopener noreferrer">
          <svg width="13" height="13"><use href="#i-external"/></svg>
          ${escapeHtml(p.name||p.key)}の申請ページへ（別タブで開く）
        </a>
        <div class="then-label">申請したら下のボタンを押してください</div>
        <button class="mark-btn" onclick="handleMarkApplied('${escapeHtml(p.key)}')" ${markingApplied?'disabled':''}>
          ${markingApplied?'保存中…':'申請しました（申請済みとして記録する）'}
        </button>
      </div>
    `;
  }
  if(p.status==='applied'||p.status==='pending'){
    return `
      <div class="action-area">
        <div class="pending-box">
          <div class="pending-lead">審査中です。承認され次第ここから API キーを入力してください。</div>
          ${!showKeyForm?`
            <button class="key-form-toggle" onclick="openKeyForm()">承認されたので API キーを入力する</button>
          `:`
            <div class="key-form">
              <input class="input" type="text" placeholder="API Key / Client ID" value="${escapeHtml(apiKey)}" oninput="apiKey=this.value" autocomplete="off" />
              <input class="input" type="text" placeholder="API Secret / Client Secret（任意）" value="${escapeHtml(apiSecret)}" oninput="apiSecret=this.value" autocomplete="off" />
              <button class="save-btn" onclick="handleSaveKeys('${escapeHtml(p.key)}')" ${savingKeys||!apiKey.trim()?'disabled':''}>
                ${savingKeys?'保存中…':'保存して診断を開始する'}
              </button>
              <button class="back-btn" style="align-self:flex-start;margin:0;padding:4px 0;" onclick="closeKeyForm()">キャンセル</button>
            </div>
          `}
        </div>
      </div>
    `;
  }
  if(p.status==='approved'){
    return `
      <div class="approved-box">
        <svg width="18" height="18"><use href="#i-badge"/></svg>
        連携済みです。診断データを取得しています。
      </div>
    `;
  }
  return '';
}

function renderDone(){
  return `
    <div class="done-wrap">
      <svg class="done-icon" viewBox="0 0 24 24" fill="none"><path d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      <div style="font-size:20px;font-weight:800;letter-spacing:.5px;margin-bottom:12px;">申請を記録しました</div>
      <p class="lead" style="margin-bottom:0;">承認され次第、AI が自動でアカウント分析を開始します。<br/>
      承認まで数日かかる場合がありますが、<strong style="color:var(--gold);">その間も無料プランで動画生成できます。</strong></p>
      <div class="done-actions">
        <button class="mark-btn" style="max-width:320px;" onclick="goSelect()">他の SNS も申請する</button>
        <a href="/dashboard.html" style="color:var(--text-3);font-size:12px;text-decoration:underline;">ダッシュボードへ進む</a>
      </div>
    </div>
  `;
}

// ──────── Init ────────
document.addEventListener('DOMContentLoaded',async()=>{
  if(window.supabase){
    sb=window.supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY,{auth:{autoRefreshToken:true,persistSession:true}});
    const {data:{session}}=await sb.auth.getSession();
    if(session){token=session.access_token;}
    else{
      // Not signed in — push to login then come back
      location.href='/login.html?next=/sns-apply.html';
      return;
    }
  }
  await loadStatus();
});
</script>
