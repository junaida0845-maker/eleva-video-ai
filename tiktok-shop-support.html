<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover,interactive-widget=resizes-content"/>
<link rel="manifest" href="/manifest.json"/>
<link rel="apple-touch-icon" href="/icons/icon-180.png"/>
<link rel="icon" type="image/png" sizes="32x32" href="/icons/icon-32.png"/>
<meta name="theme-color" content="#0a0a0a"/>
<title>ELEVA サポートチャット</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=DM+Sans:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --bg:#0a0a0a;--bg-2:#0f0f0f;--bg-3:#161616;--border:#1f1f1f;
  --gold:#c9a84c;--gold-light:#f0d070;--gold-soft:rgba(201,168,76,0.12);
  --text:#fff;--text-2:#a8a8a8;--text-3:#6b6b6b;
  --user-bg:#1e1e1e;
}
*,*::before,*::after{box-sizing:border-box;}
*{margin:0;padding:0;}
html,body{height:100%;width:100%;max-width:100vw;overflow:hidden;background:var(--bg);}
body{font-family:'DM Sans','Noto Sans JP',sans-serif;color:var(--text);-webkit-font-smoothing:antialiased;}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}
textarea{font-family:inherit;}

/* ── Layout ─────────────── */
.layout{display:flex;flex-direction:column;height:100dvh;height:100vh;max-width:760px;margin:0 auto;}

/* ── Header ─────────────── */
.nav{flex-shrink:0;background:rgba(10,10,10,0.95);backdrop-filter:saturate(180%) blur(10px);border-bottom:1px solid var(--border);padding:14px 20px;display:flex;align-items:center;justify-content:space-between;gap:14px;}
.nav-left{display:flex;align-items:center;gap:12px;min-width:0;}
.brand{font-family:'DM Sans',sans-serif;font-weight:800;font-size:16px;letter-spacing:2.5px;color:var(--gold);text-decoration:none;flex-shrink:0;}
.head-text{min-width:0;}
.head-title{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:600;color:var(--text);letter-spacing:0.3px;line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.head-sub{font-size:11px;color:var(--text-3);letter-spacing:0.3px;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.reset-btn{font-size:11px;color:var(--text-3);padding:6px 12px;border-radius:2px;letter-spacing:0.3px;transition:color .15s,border-color .15s;border:1px solid var(--border);flex-shrink:0;}
.reset-btn:hover{color:var(--text-2);border-color:var(--text-3);}

/* ── Chat messages ─────────────── */
.chat-scroll{flex:1;overflow-y:auto;overflow-x:hidden;padding:20px 16px 24px;scroll-behavior:smooth;}
.chat-scroll::-webkit-scrollbar{width:6px;}
.chat-scroll::-webkit-scrollbar-thumb{background:rgba(201,168,76,0.25);border-radius:3px;}

.msg{display:flex;margin-bottom:14px;max-width:100%;animation:msgIn .25s ease;}
@keyframes msgIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
.msg-ai{justify-content:flex-start;}
.msg-user{justify-content:flex-end;}
.bubble{max-width:82%;padding:12px 15px;border-radius:4px;font-size:14px;line-height:1.65;letter-spacing:0.1px;word-wrap:break-word;word-break:break-word;}
.bubble b{color:var(--gold);font-weight:600;}
.bubble a{color:var(--gold);text-decoration:underline;}
.msg-ai .bubble{background:var(--bg);border:1px solid var(--gold);border-left:2px solid var(--gold);color:var(--text);}
.msg-user .bubble{background:var(--user-bg);border:1px solid var(--border);color:var(--text);}
.bubble-img{display:block;max-width:200px;max-height:200px;margin:8px 0 0;border-radius:3px;border:1px solid var(--border);cursor:zoom-in;}
.bubble-img:first-child{margin-top:0;}
.msg-role{font-size:10px;color:var(--text-3);letter-spacing:1px;text-transform:uppercase;margin-bottom:4px;}

/* ── Typing ─────────────── */
.typing-dots{display:inline-flex;gap:5px;padding:3px 0;}
.typing-dots span{width:7px;height:7px;border-radius:50%;background:var(--gold);animation:typing 1.2s infinite ease-in-out;}
.typing-dots span:nth-child(2){animation-delay:0.15s;}
.typing-dots span:nth-child(3){animation-delay:0.3s;}
@keyframes typing{0%,60%,100%{opacity:0.3;transform:translateY(0);}30%{opacity:1;transform:translateY(-4px);}}

/* ── Input bar ─────────────── */
.input-bar{flex-shrink:0;background:var(--bg-2);border-top:1px solid var(--border);padding:12px 16px;padding-bottom:calc(12px + env(safe-area-inset-bottom));}
.pending-preview{display:none;margin-bottom:10px;padding:8px 10px;background:var(--bg-3);border:1px solid var(--border);border-radius:4px;align-items:center;gap:10px;}
.pending-preview.show{display:flex;}
.pending-preview img{width:48px;height:48px;object-fit:cover;border-radius:3px;border:1px solid var(--border);}
.pending-preview-name{flex:1;font-size:12px;color:var(--text-2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.pending-preview-remove{background:transparent;border:none;color:var(--text-3);font-size:18px;cursor:pointer;padding:4px 8px;border-radius:2px;}
.pending-preview-remove:hover{color:var(--text);}

.input-row{display:flex;align-items:flex-end;gap:8px;}
.chat-input{flex:1;background:var(--bg-3);border:1px solid var(--border);border-radius:4px;padding:10px 12px;color:var(--text);font-size:14px;line-height:1.5;resize:none;min-height:42px;max-height:140px;transition:border .15s,background .15s;}
.chat-input:focus{outline:none;border-color:var(--gold);background:#181818;}
.chat-input::placeholder{color:var(--text-3);}

.icon-btn{flex-shrink:0;width:42px;height:42px;background:transparent;border:1px solid var(--border);border-radius:4px;color:var(--gold);display:flex;align-items:center;justify-content:center;transition:background .15s,border-color .15s;}
.icon-btn:hover{background:var(--gold-soft);border-color:var(--gold);}
.icon-btn svg{width:18px;height:18px;}
.send-btn{flex-shrink:0;min-width:60px;height:42px;padding:0 16px;background:var(--gold);color:#000;border-radius:4px;font-size:13px;font-weight:600;letter-spacing:0.3px;transition:background .15s;}
.send-btn:hover:not(:disabled){background:var(--gold-light);}
.send-btn:disabled{opacity:0.4;cursor:not-allowed;}

/* ── Image modal (for tap-to-zoom) ─────────────── */
.img-modal{position:fixed;inset:0;background:rgba(0,0,0,0.92);display:none;align-items:center;justify-content:center;z-index:1000;padding:20px;cursor:zoom-out;}
.img-modal.open{display:flex;}
.img-modal img{max-width:100%;max-height:100%;border-radius:4px;}

@media (max-width:520px){
  .nav{padding:12px 16px;}
  .head-title{font-size:16px;}
  .head-sub{display:none;}
  .chat-scroll{padding:16px 12px 20px;}
  .bubble{max-width:90%;font-size:13.5px;}
  .input-bar{padding:10px 12px;padding-bottom:calc(10px + env(safe-area-inset-bottom));}
  .send-btn{padding:0 14px;min-width:56px;}
}
</style>

</head>
<body>

<div class="layout">

  <nav class="nav">
    <div class="nav-left">
      <a href="/dashboard.html" class="brand">ELEVA</a>
      <div class="head-text">
        <div class="head-title">サポートチャット</div>
        <div class="head-sub">設定でわからないことは、ここで質問してください</div>
      </div>
    </div>
    <button class="reset-btn" onclick="resetChat()">会話をリセット</button>
  </nav>

  <div class="chat-scroll" id="chat-messages"></div>

  <div class="input-bar">
    <div class="pending-preview" id="pending-preview">
      <img id="pending-preview-img" alt=""/>
      <div class="pending-preview-name" id="pending-preview-name">画像</div>
      <button class="pending-preview-remove" onclick="clearImagePreview()" aria-label="画像を削除">×</button>
    </div>
    <div class="input-row">
      <input type="file" id="file-input" accept="image/*" style="display:none" onchange="handleImageUpload(event)"/>
      <button class="icon-btn" onclick="document.getElementById('file-input').click()" aria-label="スクショ追加" title="スクショ追加">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"/></svg>
      </button>
      <textarea class="chat-input" id="chat-input" rows="1" placeholder="質問を入力…（Shift+Enter で改行）"></textarea>
      <button class="send-btn" id="send-btn" onclick="sendMessage()">送信</button>
    </div>
  </div>

</div>

<div class="img-modal" id="img-modal" onclick="closeImgModal()">
  <img id="img-modal-img" alt=""/>
</div>

<script src="/eleva-i18n.js?v=20260419"></script>
<script src="/eleva-shared.js?v=20260419"></script>
<script>
const SUPABASE_URL='https://syxctolgqhdtcoaothwi.supabase.co';
const SUPABASE_ANON_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN5eGN0b2xncWhkdGNvYW90aHdpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4MDk5NjksImV4cCI6MjA5MDM4NTk2OX0.h38gOPGOcdIw_w8p4AEYVLHCaWuC8k2XRrjLPcFAtUw';
const CHAT_ENDPOINT=SUPABASE_URL+'/functions/v1/eleva-support-chat';

let user=null;
let chatHistory=[];
let pendingImage=null;
let pendingImageName='';
let loadingCounter=0;

// ── HTML escape + markdown-lite ─────────────
function escapeHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function formatText(s){
  return escapeHtml(s)
    .replace(/\*\*(.*?)\*\*/g,'<b>$1</b>')
    .replace(/\n/g,'<br>');
}

// ── Image compression (screenshots → max 1024px JPEG) ─────────────
function compressImage(file,maxDim=1024,quality=0.85){
  return new Promise((resolve,reject)=>{
    const img=new Image();
    const url=URL.createObjectURL(file);
    img.onload=()=>{
      let w=img.width,h=img.height;
      if(w>maxDim||h>maxDim){
        if(w>=h){h=Math.round(h*maxDim/w);w=maxDim;}
        else{w=Math.round(w*maxDim/h);h=maxDim;}
      }
      const canvas=document.createElement('canvas');
      canvas.width=w;canvas.height=h;
      const ctx=canvas.getContext('2d');
      ctx.drawImage(img,0,0,w,h);
      URL.revokeObjectURL(url);
      resolve(canvas.toDataURL('image/jpeg',quality));
    };
    img.onerror=()=>{URL.revokeObjectURL(url);reject(new Error('image load failed'));};
    img.src=url;
  });
}

// ── Image upload + preview ─────────────
async function handleImageUpload(e){
  const file=e.target.files[0];
  e.target.value='';
  if(!file)return;
  if(!file.type.startsWith('image/')){
    alert('画像ファイルを選択してください。');
    return;
  }
  try{
    const dataUrl=await compressImage(file);
    pendingImage=dataUrl;
    pendingImageName=file.name||'画像';
    showImagePreview(dataUrl,pendingImageName);
  }catch(err){
    alert('画像の読み込みに失敗しました。');
  }
}
function showImagePreview(dataUrl,name){
  const box=document.getElementById('pending-preview');
  document.getElementById('pending-preview-img').src=dataUrl;
  document.getElementById('pending-preview-name').textContent=name||'画像';
  box.classList.add('show');
}
function clearImagePreview(){
  pendingImage=null;
  pendingImageName='';
  document.getElementById('pending-preview').classList.remove('show');
  document.getElementById('pending-preview-img').src='';
}

// ── Message DOM ─────────────
function appendMessage(role,text,imageData){
  const wrap=document.getElementById('chat-messages');
  const div=document.createElement('div');
  div.className='msg msg-'+role;
  const bubble=document.createElement('div');
  bubble.className='bubble';
  let inner='';
  if(imageData){
    const safeData=escapeHtml(imageData);
    inner+='<img class="bubble-img" src="'+safeData+'" alt="添付画像" onclick="openImgModal(this.src)"/>';
  }
  if(text){
    inner+='<div>'+formatText(text)+'</div>';
  }
  bubble.innerHTML=inner;
  div.appendChild(bubble);
  wrap.appendChild(div);
  scrollToBottom();
}
function appendLoading(){
  const id='loading-'+(++loadingCounter);
  const wrap=document.getElementById('chat-messages');
  const div=document.createElement('div');
  div.className='msg msg-ai';
  div.id=id;
  div.innerHTML='<div class="bubble"><div class="typing-dots"><span></span><span></span><span></span></div></div>';
  wrap.appendChild(div);
  scrollToBottom();
  return id;
}
function removeLoading(id){
  const el=document.getElementById(id);
  if(el)el.remove();
}
function scrollToBottom(){
  const wrap=document.getElementById('chat-messages');
  wrap.scrollTop=wrap.scrollHeight;
}

// ── Image modal ─────────────
function openImgModal(src){
  document.getElementById('img-modal-img').src=src;
  document.getElementById('img-modal').classList.add('open');
}
function closeImgModal(){
  document.getElementById('img-modal').classList.remove('open');
  document.getElementById('img-modal-img').src='';
}

// ── Send ─────────────
async function sendMessage(){
  const input=document.getElementById('chat-input');
  const sendBtn=document.getElementById('send-btn');
  const text=input.value.trim();
  if(!text&&!pendingImage)return;

  const imageData=pendingImage;
  appendMessage('user',text,imageData);
  input.value='';
  autoResizeInput();
  pendingImage=null;
  clearImagePreview();

  sendBtn.disabled=true;
  const loadingId=appendLoading();

  try{
    const sb=ELEVA.getSupabase();
    const {data:{session}}=await sb.auth.getSession();
    if(!session){
      removeLoading(loadingId);
      appendMessage('ai','ログインが必要です。ログインページへ移動します…',null);
      setTimeout(()=>location.href='/login.html?next=/tiktok-shop-support.html',1200);
      return;
    }

    const payload={
      message:text,
      history:chatHistory.slice(-10),
    };
    if(imageData)payload.image_base64=imageData;

    const res=await fetch(CHAT_ENDPOINT,{
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        apikey:SUPABASE_ANON_KEY,
        'Authorization':'Bearer '+session.access_token,
      },
      body:JSON.stringify(payload),
    });
    const json=await res.json().catch(()=>({}));
    removeLoading(loadingId);

    if(res.ok&&json.reply){
      appendMessage('ai',json.reply,null);
      chatHistory.push({role:'user',content:text});
      chatHistory.push({role:'assistant',content:json.reply});
    }else{
      const errMsg=json.error||json.message||('HTTP '+res.status);
      appendMessage('ai','エラーが発生しました: '+errMsg+'\n\nもう一度お試しください。',null);
    }
  }catch(e){
    removeLoading(loadingId);
    appendMessage('ai','通信エラーが発生しました。ネットワークをご確認のうえ再送してください。',null);
  }finally{
    sendBtn.disabled=false;
    input.focus();
  }
}

function resetChat(){
  chatHistory=[];
  document.getElementById('chat-messages').innerHTML='';
  appendMessage('ai',
    'こんにちは。ELEVA サポートチャットです。\n\n'+
    'TikTok Shop・Amazon・4Seller の設定でわからないことがあれば、スクリーンショットを添付して質問してください。',
    null
  );
}

// ── Textarea auto-resize ─────────────
function autoResizeInput(){
  const ta=document.getElementById('chat-input');
  ta.style.height='auto';
  ta.style.height=Math.min(140,ta.scrollHeight)+'px';
}

// ── Init ─────────────
document.addEventListener('DOMContentLoaded',async()=>{
  if(window.ELEVA?.applyLanguage)ELEVA.applyLanguage(localStorage.getItem('eleva_lang')||'ja');
  user=await ELEVA.initElevaPage({page:'tiktok-shop-support',requireAuth:true,onUser:u=>{user=u;}});
  if(!user)return;

  resetChat();

  const input=document.getElementById('chat-input');
  input.addEventListener('keydown',e=>{
    if(e.key==='Enter'&&!e.shiftKey){
      e.preventDefault();
      sendMessage();
    }
  });
  input.addEventListener('input',autoResizeInput);
});
</script>
<script src="/eleva-chat-widget.js?v=20260423" defer></script>
</body>
</html>
