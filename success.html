<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>ELEVA — ご登録ありがとうございます</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#0a0a0a;--bg-2:#0f0f0f;--border:#1f1f1f;--gold:#d4af37;--gold-2:#b8941f;--text:#fff;--text-2:#a8a8a8;--text-3:#6b6b6b;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Inter','Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;}
.card{max-width:480px;width:100%;background:var(--bg-2);border:1px solid var(--border);border-radius:20px;padding:48px 32px;text-align:center;box-shadow:0 4px 28px rgba(212,175,55,0.18);}
.icon-wrap{width:72px;height:72px;border-radius:50%;background:rgba(212,175,55,0.12);display:flex;align-items:center;justify-content:center;margin:0 auto 24px;}
.icon-wrap svg{width:34px;height:34px;color:var(--gold);}
h1{font-size:24px;font-weight:800;letter-spacing:1px;margin-bottom:14px;}
p{color:var(--text-2);font-size:14px;line-height:1.7;margin-bottom:8px;}
.plan-info{background:#161616;border:1px solid var(--border);border-radius:12px;padding:16px 20px;margin:24px 0;}
.plan-info-label{color:var(--text-3);font-size:11px;letter-spacing:1px;text-transform:uppercase;margin-bottom:4px;}
.plan-info-name{color:var(--gold);font-size:18px;font-weight:700;}
.btn{display:inline-block;background:linear-gradient(135deg,var(--gold) 0%,var(--gold-2) 100%);color:#0a0a0a;font-weight:700;padding:14px 28px;border-radius:12px;text-decoration:none;font-size:14px;letter-spacing:.5px;margin-top:12px;transition:transform .15s,box-shadow .15s;}
.btn:hover{transform:translateY(-1px);box-shadow:0 4px 20px rgba(212,175,55,0.35);}
.muted{color:var(--text-3);font-size:12px;margin-top:18px;}
</style>
<!-- eleva-sw-register --><script>if('serviceWorker' in navigator){window.addEventListener('load',async()=>{try{const reg=await navigator.serviceWorker.register('/sw.js');reg.addEventListener('updatefound',()=>{const nw=reg.installing;nw.addEventListener('statechange',()=>{if(nw.state==='installed'&&navigator.serviceWorker.controller){nw.postMessage('skipWaiting');navigator.serviceWorker.addEventListener('controllerchange',()=>window.location.reload());}});});setInterval(()=>reg.update(),30*60*1000);}catch(e){console.log('SW registration failed:',e);}});}</script>
</head>
<body>
<div class="card">
  <div class="icon-wrap">
    <svg viewBox="0 0 24 24" fill="none"><path d="M20 6L9 17l-5-5" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg>
  </div>
  <h1 data-i18n="success_title">ご登録ありがとうございます</h1>
  <p data-i18n="success_sub">決済が完了しました。ご利用開始の準備ができています。</p>
  <div class="plan-info">
    <div class="plan-info-label" data-i18n="current_plan">現在のプラン</div>
    <div class="plan-info-name" id="plan-name">—</div>
  </div>
  <a href="/dashboard.html" class="btn" data-i18n="success_cta">ダッシュボードへ</a>
  <div class="muted" data-i18n="success_email">領収書はご登録のメールアドレスにお送りしました。</div>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/eleva-i18n.js?v=20260419"></script>
<script src="/eleva-shared.js?v=20260419"></script>
<script>
document.addEventListener('DOMContentLoaded',async()=>{
  if(window.ELEVA?.applyLanguage)ELEVA.applyLanguage(localStorage.getItem('eleva_lang')||'ja');
  const params=new URLSearchParams(location.search);
  const isAddon=params.get('type')==='addon';
  if(isAddon){
    document.querySelector('h1').textContent='追加購入が完了しました';
    document.querySelector('p').textContent='クレジットを追加しました。すぐに動画生成を続けられます。';
    document.querySelector('.btn').setAttribute('href','/dashboard.html');
    document.querySelector('.btn').textContent='動画生成に戻る';
  }
  const sb=ELEVA.getSupabase?.();
  if(sb){
    try{
      const {data:{session}}=await sb.auth.getSession();
      if(session){
        const {data}=await sb.from('profiles').select('plan_type,credits_remaining').eq('id',session.user.id).single();
        if(data){
          if(isAddon)document.getElementById('plan-name').textContent='残クレジット: '+(data.credits_remaining||0);
          else if(data.plan_type)document.getElementById('plan-name').textContent=String(data.plan_type).toUpperCase();
        }
      }
    }catch(e){}
  }
});
</script>
<script src="/eleva-chat-widget.js?v=20260423" defer></script>
</body>
</html>
