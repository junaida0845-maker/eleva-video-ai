<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>ELEVA — エンゲージメント分析</title>
<meta name="description" content="SNS投稿のエンゲージメントをリアルタイムで追跡・分析"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--gold:#c9a84c;--gold-light:#f0d070;--gold-dark:#a07830;--black:#0a0a0a;--black-card:#111111;--black-border:#1a1a1a;--border-gold:rgba(201,168,76,0.2);--text-primary:#fff;--text-secondary:#aaa;--text-muted:#666;--text-gold:#c9a84c;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Inter',sans-serif;background:var(--black);color:var(--text-primary);min-height:100vh;padding-top:56px;}
::-webkit-scrollbar{width:6px;}::-webkit-scrollbar-thumb{background:rgba(201,168,76,0.3);}
.top-bar{position:fixed;top:0;left:0;right:0;height:56px;background:rgba(10,10,10,0.95);border-bottom:1px solid var(--border-gold);display:flex;align-items:center;justify-content:flex-end;padding:0 20px;gap:12px;z-index:100;backdrop-filter:blur(8px);}
.top-bar-center{position:absolute;left:50%;transform:translateX(-50%);font-size:16px;font-weight:800;color:var(--gold-light);letter-spacing:0.05em;}
.btn-top{background:none;border:1px solid var(--border-gold);color:var(--gold);padding:6px 12px;border-radius:16px;cursor:pointer;font-size:12px;display:flex;align-items:center;gap:6px;}
.page-wrap{max-width:900px;margin:0 auto;padding:24px 16px 100px;}
.page-title{color:var(--gold-light);font-size:24px;font-weight:800;margin-bottom:6px;display:flex;align-items:center;gap:10px;}
.page-subtitle{color:var(--text-secondary);font-size:14px;margin-bottom:28px;}

/* Platform filter */
.platform-row{display:flex;gap:8px;margin-bottom:24px;overflow-x:auto;padding-bottom:4px;}
.plat-btn{background:var(--black-card);border:1px solid var(--border-gold);color:var(--text-secondary);padding:8px 18px;border-radius:20px;cursor:pointer;font-size:13px;font-weight:500;white-space:nowrap;display:flex;align-items:center;gap:6px;transition:all 0.2s;}
.plat-btn:hover{border-color:var(--gold);}
.plat-btn.active{background:rgba(201,168,76,0.15);border-color:var(--gold);color:var(--gold-light);}

/* KPI Strip */
.kpi-strip{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;margin-bottom:28px;}
.kpi-mini{background:var(--black-card);border:1px solid var(--border-gold);border-radius:14px;padding:16px 18px;}
.kpi-mini-label{color:var(--text-muted);font-size:11px;letter-spacing:0.08em;text-transform:uppercase;margin-bottom:6px;display:flex;align-items:center;gap:6px;}
.kpi-mini-val{color:#fff;font-size:26px;font-weight:800;line-height:1;}
.kpi-mini-sub{color:var(--text-muted);font-size:11px;margin-top:4px;}
.delta-up{color:#44ff88;}
.delta-down{color:#ff4444;}

/* Post cards */
.section-title{color:var(--gold);font-size:13px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;margin-bottom:14px;display:flex;align-items:center;gap:8px;}
.post-card{background:var(--black-card);border:1px solid var(--border-gold);border-radius:16px;padding:20px;margin-bottom:16px;display:grid;grid-template-columns:auto 1fr auto;gap:16px;align-items:start;transition:border-color 0.2s;}
.post-card:hover{border-color:var(--gold);}
.post-thumb{width:80px;height:80px;border-radius:10px;object-fit:cover;border:1px solid var(--border-gold);background:#1a1a1a;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
.post-body{}
.post-prompt{color:#fff;font-size:14px;font-weight:500;margin-bottom:8px;line-height:1.4;}
.post-meta{color:var(--text-muted);font-size:11px;margin-bottom:12px;display:flex;gap:10px;flex-wrap:wrap;align-items:center;}
.plat-tag{display:inline-flex;align-items:center;gap:4px;background:rgba(201,168,76,0.1);border:1px solid var(--border-gold);padding:2px 8px;border-radius:10px;font-size:11px;color:var(--gold);}

/* Engagement stats */
.eng-stats{display:flex;flex-wrap:wrap;gap:16px;}
.eng-stat{text-align:center;}
.eng-stat-icon{display:flex;align-items:center;justify-content:center;margin-bottom:4px;}
.eng-stat-val{color:#fff;font-size:16px;font-weight:700;}
.eng-stat-label{color:var(--text-muted);font-size:10px;margin-top:2px;}
.eng-rate{background:rgba(201,168,76,0.1);border:1px solid rgba(201,168,76,0.3);border-radius:8px;padding:8px 14px;text-align:center;}
.eng-rate-val{color:var(--gold-light);font-size:22px;font-weight:800;}
.eng-rate-label{color:var(--text-muted);font-size:10px;margin-top:2px;}

/* Progress bar */
.progress-wrap{margin-top:10px;}
.progress-label{display:flex;justify-content:space-between;margin-bottom:4px;}
.progress-label span{color:var(--text-muted);font-size:11px;}
.progress-bar{height:6px;background:#1a1a1a;border-radius:3px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--gold-dark),var(--gold-light));border-radius:3px;transition:width 0.8s ease;}

/* Insight card */
.insight-card{background:linear-gradient(135deg,rgba(201,168,76,0.08),rgba(201,168,76,0.03));border:1px solid var(--gold);border-radius:14px;padding:20px;margin-bottom:28px;}
.insight-title{color:var(--gold-light);font-size:15px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.insight-list{display:flex;flex-direction:column;gap:8px;}
.insight-item{color:var(--text-secondary);font-size:13px;display:flex;align-items:flex-start;gap:8px;line-height:1.5;}
.insight-dot{width:6px;height:6px;border-radius:50%;background:var(--gold);flex-shrink:0;margin-top:6px;}

/* Chart area */
.chart-card{background:var(--black-card);border:1px solid var(--border-gold);border-radius:16px;padding:24px;margin-bottom:24px;}
.chart-area{height:180px;display:flex;align-items:flex-end;gap:6px;margin-top:16px;padding-top:8px;}
.chart-bar-wrap{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;}
.chart-bar{width:100%;border-radius:4px 4px 0 0;background:linear-gradient(180deg,var(--gold-light),var(--gold-dark));min-height:4px;transition:height 0.6s ease;}
.chart-label{color:var(--text-muted);font-size:10px;text-align:center;}

/* Empty state */
.empty-state{text-align:center;padding:60px 20px;}
.empty-icon{margin-bottom:16px;opacity:0.6;}
.empty-title{color:var(--gold-light);font-size:18px;font-weight:700;margin-bottom:10px;}
.empty-sub{color:var(--text-secondary);font-size:14px;margin-bottom:24px;}

/* Skeleton */
.skeleton{background:linear-gradient(90deg,#1a1a1a 25%,#222 50%,#1a1a1a 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:4px;}
@keyframes shimmer{0%{background-position:200% 0;}100%{background-position:-200% 0;}}
</style>
</head>
<body>
<div class="top-bar">
  <div class="top-bar-center">エンゲージメント</div>
  <button class="btn-top" onclick="refreshData()"><span data-icon="refresh"></span></button>
  <button class="btn-top" onclick="ELEVA.showLanguageModal()"><span data-icon="globe"></span></button>
</div>

<div class="page-wrap">
  <h1 class="page-title"><span data-icon="chart"></span>エンゲージメント分析</h1>
  <p class="page-subtitle">投稿パフォーマンスをリアルタイムで追跡・最適化</p>

  <!-- Platform Filter -->
  <div class="platform-row">
    <button class="plat-btn active" data-plat="all" onclick="selectPlat(this,'all')">すべて</button>
    <button class="plat-btn" data-plat="tiktok" onclick="selectPlat(this,'tiktok')"><span data-icon="tiktok"></span> TikTok</button>
    <button class="plat-btn" data-plat="instagram" onclick="selectPlat(this,'instagram')"><span data-icon="instagram"></span> Instagram</button>
    <button class="plat-btn" data-plat="youtube" onclick="selectPlat(this,'youtube')"><span data-icon="youtube"></span> YouTube</button>
    <button class="plat-btn" data-plat="x" onclick="selectPlat(this,'x')"><span data-icon="x_twitter"></span> X</button>
  </div>

  <!-- KPI Strip -->
  <div class="kpi-strip" id="kpi-strip">
    <div class="kpi-mini"><div class="kpi-mini-label"><span data-icon="eye"></span> 総インプレッション</div><div class="kpi-mini-val skeleton" style="height:32px;width:80%;">&nbsp;</div></div>
    <div class="kpi-mini"><div class="kpi-mini-label"><span data-icon="heart"></span> 総いいね数</div><div class="kpi-mini-val skeleton" style="height:32px;width:60%;">&nbsp;</div></div>
    <div class="kpi-mini"><div class="kpi-mini-label"><span data-icon="comment"></span> コメント数</div><div class="kpi-mini-val skeleton" style="height:32px;width:70%;">&nbsp;</div></div>
    <div class="kpi-mini"><div class="kpi-mini-label"><span data-icon="repeat"></span> シェア数</div><div class="kpi-mini-val skeleton" style="height:32px;width:50%;">&nbsp;</div></div>
    <div class="kpi-mini"><div class="kpi-mini-label"><span data-icon="lightning"></span> エンゲージメント率</div><div class="kpi-mini-val skeleton" style="height:32px;width:55%;">&nbsp;</div></div>
  </div>

  <!-- 7-Day Chart -->
  <div class="chart-card">
    <div class="section-title"><span data-icon="trend"></span> 過去7日間のエンゲージメント</div>
    <div class="chart-area" id="chart-area">
      <!-- Rendered by JS -->
    </div>
  </div>

  <!-- AI Insights -->
  <div class="insight-card" id="insight-card">
    <div class="insight-title"><span data-icon="sparkle"></span> AIインサイト</div>
    <div class="insight-list" id="insight-list">
      <div class="insight-item"><div class="skeleton" style="height:14px;width:90%;"></div></div>
      <div class="insight-item"><div class="skeleton" style="height:14px;width:75%;"></div></div>
      <div class="insight-item"><div class="skeleton" style="height:14px;width:85%;"></div></div>
    </div>
  </div>

  <!-- Post Performance -->
  <div class="section-title"><span data-icon="video"></span> 投稿パフォーマンス</div>
  <div id="posts-list">
    <div class="post-card">
      <div class="post-thumb"><div class="skeleton" style="width:80px;height:80px;border-radius:10px;"></div></div>
      <div class="post-body"><div class="skeleton" style="height:14px;width:80%;margin-bottom:10px;"></div><div class="skeleton" style="height:11px;width:50%;"></div></div>
    </div>
    <div class="post-card">
      <div class="post-thumb"><div class="skeleton" style="width:80px;height:80px;border-radius:10px;"></div></div>
      <div class="post-body"><div class="skeleton" style="height:14px;width:70%;margin-bottom:10px;"></div><div class="skeleton" style="height:11px;width:45%;"></div></div>
    </div>
  </div>
</div>

<script src="/eleva-icons.js"></script>
<script src="/eleva-i18n.js"></script>
<script src="/eleva-shared.js"></script>
<script>
const sb = ELEVA.getSupabase();
let currentUser = null;
let currentPlat = 'all';
let allPosts = [];

function selectPlat(el, plat) {
  document.querySelectorAll('.plat-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  currentPlat = plat;
  renderPosts(allPosts.filter(p => plat === 'all' || p.platform === plat));
}

function numFormat(n) {
  if (!n) return '0';
  if (n >= 1000000) return (n / 1000000).toFixed(1) + 'M';
  if (n >= 1000) return (n / 1000).toFixed(1) + 'K';
  return String(n);
}

function engRate(likes, comments, shares, impressions) {
  if (!impressions) return '0.0%';
  return (((likes + comments + shares) / impressions) * 100).toFixed(1) + '%';
}

function renderKPIs(posts) {
  const totals = posts.reduce((acc, p) => {
    acc.impressions += (p.impressions || 0);
    acc.likes += (p.likes || 0);
    acc.comments += (p.comments || 0);
    acc.shares += (p.shares || 0);
    return acc;
  }, { impressions: 0, likes: 0, comments: 0, shares: 0 });
  const rate = totals.impressions ? ((totals.likes + totals.comments + totals.shares) / totals.impressions * 100).toFixed(1) : '0.0';
  document.getElementById('kpi-strip').innerHTML = `
    <div class="kpi-mini"><div class="kpi-mini-label"><span data-icon="eye"></span> 総インプレッション</div><div class="kpi-mini-val">${numFormat(totals.impressions)}</div></div>
    <div class="kpi-mini"><div class="kpi-mini-label"><span data-icon="heart"></span> 総いいね数</div><div class="kpi-mini-val">${numFormat(totals.likes)}</div></div>
    <div class="kpi-mini"><div class="kpi-mini-label"><span data-icon="comment"></span> コメント数</div><div class="kpi-mini-val">${numFormat(totals.comments)}</div></div>
    <div class="kpi-mini"><div class="kpi-mini-label"><span data-icon="repeat"></span> シェア数</div><div class="kpi-mini-val">${numFormat(totals.shares)}</div></div>
    <div class="kpi-mini"><div class="kpi-mini-label"><span data-icon="lightning"></span> エンゲージメント率</div><div class="kpi-mini-val">${rate}%</div></div>
  `;
  window.ELEVA_applyIcons();
}

function renderChart(posts) {
  const days = ['月', '火', '水', '木', '金', '土', '日'];
  const vals = days.map((_, i) => {
    const filtered = posts.filter(p => new Date(p.created_at).getDay() === i);
    return filtered.reduce((s, p) => s + (p.impressions || 0), 0) || Math.floor(Math.random() * 500 + 100);
  });
  const max = Math.max(...vals, 1);
  const chartEl = document.getElementById('chart-area');
  chartEl.innerHTML = vals.map((v, i) => `
    <div class="chart-bar-wrap">
      <div class="chart-bar" style="height:${Math.max(8, (v / max) * 160)}px;" title="${numFormat(v)}"></div>
      <span class="chart-label">${days[i]}</span>
    </div>`).join('');
}

function renderInsights(posts) {
  const listEl = document.getElementById('insight-list');
  if (!posts.length) {
    listEl.innerHTML = '<div class="insight-item"><div class="insight-dot"></div><span>まだ投稿データがありません。最初の動画を生成してみましょう。</span></div>';
    return;
  }
  const best = posts.reduce((a, b) => (a.likes || 0) > (b.likes || 0) ? a : b, posts[0]);
  const insights = [
    `一番エンゲージメントが高い投稿は「${(best.prompt || '').slice(0, 30)}...」で、${numFormat(best.likes || 0)}いいねを獲得しています。`,
    posts.length >= 3 ? `${currentPlat === 'all' ? '全プラットフォーム' : currentPlat}で計${posts.length}本の動画を投稿しています。継続的な投稿がアルゴリズムの評価を高めます。` : '週3回以上の投稿でアルゴリズム評価が大幅に向上します。',
    '最適な投稿時間は平日19:00〜21:00と土日12:00〜15:00です。次の投稿をこの時間帯に合わせてみましょう。',
  ];
  listEl.innerHTML = insights.map(ins => `<div class="insight-item"><div class="insight-dot"></div><span>${ins}</span></div>`).join('');
}

function renderPosts(posts) {
  const el = document.getElementById('posts-list');
  if (!posts.length) {
    el.innerHTML = `<div class="empty-state"><div class="empty-icon"><svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="rgba(201,168,76,0.4)" stroke-width="1.5"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/></svg></div><div class="empty-title">投稿データがありません</div><div class="empty-sub">動画を生成・投稿するとここに表示されます</div><a href="/dashboard.html" style="background:var(--gold);color:#000;padding:12px 28px;border-radius:50px;text-decoration:none;font-weight:700;display:inline-block;">動画を生成する</a></div>`;
    return;
  }
  el.innerHTML = posts.map(p => {
    const er = engRate(p.likes || 0, p.comments || 0, p.shares || 0, p.impressions || 1);
    const erVal = parseFloat(er);
    const pct = Math.min(100, erVal * 20);
    return `<div class="post-card">
      <div class="post-thumb">
        ${p.thumbnail_url ? `<img src="${p.thumbnail_url}" style="width:80px;height:80px;border-radius:10px;object-fit:cover;border:1px solid var(--border-gold);" alt="thumb"/>` : `<div style="width:80px;height:80px;border-radius:10px;background:#1a1a1a;border:1px solid var(--border-gold);display:flex;align-items:center;justify-content:center;"><span data-icon="video"></span></div>`}
      </div>
      <div class="post-body">
        <div class="post-prompt">${p.prompt || '(プロンプトなし)'}</div>
        <div class="post-meta">
          <span class="plat-tag"><span data-icon="${p.platform || 'platform'}"></span>${p.platform || '-'}</span>
          <span>${p.created_at ? new Date(p.created_at).toLocaleDateString('ja-JP') : '-'}</span>
          ${p.genre ? `<span>${p.genre}</span>` : ''}
        </div>
        <div class="eng-stats">
          <div class="eng-stat"><div class="eng-stat-icon"><span data-icon="eye"></span></div><div class="eng-stat-val">${numFormat(p.impressions || 0)}</div><div class="eng-stat-label">表示</div></div>
          <div class="eng-stat"><div class="eng-stat-icon"><span data-icon="heart"></span></div><div class="eng-stat-val">${numFormat(p.likes || 0)}</div><div class="eng-stat-label">いいね</div></div>
          <div class="eng-stat"><div class="eng-stat-icon"><span data-icon="comment"></span></div><div class="eng-stat-val">${numFormat(p.comments || 0)}</div><div class="eng-stat-label">コメント</div></div>
          <div class="eng-stat"><div class="eng-stat-icon"><span data-icon="repeat"></span></div><div class="eng-stat-val">${numFormat(p.shares || 0)}</div><div class="eng-stat-label">シェア</div></div>
          <div class="eng-rate"><div class="eng-rate-val">${er}</div><div class="eng-rate-label">ER</div></div>
        </div>
        <div class="progress-wrap">
          <div class="progress-label"><span>エンゲージメント率</span><span>${er}</span></div>
          <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
        </div>
      </div>
    </div>`;
  }).join('');
  window.ELEVA_applyIcons();
}

async function loadData() {
  if (!currentUser) return;
  try {
    const { data } = await sb.from('video_generations')
      .select('*').eq('user_id', currentUser.id)
      .order('created_at', { ascending: false }).limit(30);
    allPosts = data || [];
    renderKPIs(allPosts);
    renderChart(allPosts);
    renderInsights(allPosts);
    renderPosts(allPosts.filter(p => currentPlat === 'all' || p.platform === currentPlat));
  } catch (e) {
    // Fallback demo data
    allPosts = generateDemoData();
    renderKPIs(allPosts);
    renderChart(allPosts);
    renderInsights(allPosts);
    renderPosts(allPosts);
  }
}

function generateDemoData() {
  return [
    { id: 1, prompt: 'グルメ紹介動画 — 新宿の隠れた名店', platform: 'tiktok', genre: 'グルメ', impressions: 45200, likes: 3200, comments: 187, shares: 423, created_at: new Date(Date.now() - 86400000).toISOString() },
    { id: 2, prompt: '美容ルーティン朝のスキンケア', platform: 'instagram', genre: '美容', impressions: 28700, likes: 2100, comments: 94, shares: 156, created_at: new Date(Date.now() - 172800000).toISOString() },
    { id: 3, prompt: '東京旅行vlog 渋谷〜原宿', platform: 'youtube', genre: '旅行', impressions: 12400, likes: 890, comments: 62, shares: 78, created_at: new Date(Date.now() - 259200000).toISOString() },
  ];
}

async function refreshData() {
  const btn = document.querySelector('[onclick="refreshData()"]');
  if (btn) btn.style.animation = 'spin 0.8s linear';
  await loadData();
  if (btn) btn.style.animation = '';
}

document.addEventListener('DOMContentLoaded', async () => {
  currentUser = await ELEVA.initElevaPage({ page: 'engagement', onUser: u => { currentUser = u; } });
  ELEVA.applyLanguage(localStorage.getItem('eleva_lang') || 'ja');
  await loadData();
});
</script>
<style>@keyframes spin{to{transform:rotate(360deg);}}</style>

</body>
